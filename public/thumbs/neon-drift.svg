<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1240"/>
      <stop offset="1" stop-color="#050818"/>
    </linearGradient>
    <linearGradient id="player" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9a3412"/>
      <stop offset="0.5" stop-color="#ff6b35"/>
      <stop offset="1" stop-color="#ffb627"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- road -->
  <rect x="50" y="0" width="300" height="400" fill="#0c1428"/>
  <!-- neon edges -->
  <rect x="46" y="0" width="4" height="400" fill="#ff6b35"/>
  <rect x="350" y="0" width="4" height="400" fill="#ff6b35"/>
  <!-- lane dashes -->
  <g fill="#fff" opacity="0.45">
    <rect x="123" y="20"  width="4" height="40"/>
    <rect x="123" y="90"  width="4" height="40"/>
    <rect x="123" y="160" width="4" height="40"/>
    <rect x="123" y="230" width="4" height="40"/>
    <rect x="123" y="300" width="4" height="40"/>
    <rect x="198" y="50"  width="4" height="40"/>
    <rect x="198" y="120" width="4" height="40"/>
    <rect x="198" y="190" width="4" height="40"/>
    <rect x="198" y="260" width="4" height="40"/>
    <rect x="198" y="330" width="4" height="40"/>
    <rect x="273" y="20"  width="4" height="40"/>
    <rect x="273" y="90"  width="4" height="40"/>
    <rect x="273" y="160" width="4" height="40"/>
    <rect x="273" y="230" width="4" height="40"/>
    <rect x="273" y="300" width="4" height="40"/>
  </g>
  <!-- background traffic (other cars) -->
  <g>
    <rect x="78"  y="80"  width="38" height="60" rx="7" fill="#3b82f6"/>
    <rect x="84"  y="90"  width="26" height="14" rx="3" fill="rgba(180,220,255,0.85)"/>
    <rect x="218" y="40"  width="38" height="60" rx="7" fill="#22c55e"/>
    <rect x="224" y="50"  width="26" height="14" rx="3" fill="rgba(180,220,255,0.85)"/>
    <rect x="293" y="160" width="38" height="60" rx="7" fill="#a855f7"/>
    <rect x="299" y="170" width="26" height="14" rx="3" fill="rgba(180,220,255,0.85)"/>
    <rect x="153" y="200" width="38" height="60" rx="7" fill="#06b6d4"/>
    <rect x="159" y="210" width="26" height="14" rx="3" fill="rgba(180,220,255,0.85)"/>
  </g>
  <!-- spark collectible -->
  <circle cx="235" cy="270" r="14" fill="#ffe27a"/>
  <circle cx="235" cy="270" r="8"  fill="#fff"/>
  <!-- player car (foreground bottom) -->
  <g>
    <rect x="172" y="296" width="46" height="74" rx="9" fill="url(#player)"/>
    <rect x="178" y="306" width="34" height="18" rx="4" fill="rgba(180,220,255,0.9)"/>
    <rect x="178" y="346" width="34" height="14" rx="4" fill="rgba(60,80,120,0.6)"/>
    <rect x="174" y="290" width="14" height="4" fill="#fffbe8"/>
    <rect x="202" y="290" width="14" height="4" fill="#fffbe8"/>
  </g>
  <!-- boost trails -->
  <g fill="#ff6b35" opacity="0.65">
    <rect x="187" y="372" width="6" height="14"/>
    <rect x="197" y="372" width="6" height="14"/>
  </g>
  <g fill="#ffb627" opacity="0.45">
    <rect x="187" y="386" width="6" height="10"/>
    <rect x="197" y="386" width="6" height="10"/>
  </g>
</svg>
