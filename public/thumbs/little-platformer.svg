<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#b8e6d5"/>
      <stop offset="0.6" stop-color="#9bd4be"/>
      <stop offset="1"   stop-color="#7fc3a8"/>
    </linearGradient>
  </defs>

  <!-- sky gradient -->
  <rect width="400" height="400" fill="url(#sky)"/>

  <!-- starfield dots -->
  <g fill="#ffffff" opacity="0.85">
    <rect x="20"  y="30"  width="2" height="2"/>
    <rect x="60"  y="80"  width="2" height="2"/>
    <rect x="110" y="40"  width="2" height="2"/>
    <rect x="155" y="70"  width="3" height="3"/>
    <rect x="190" y="35"  width="2" height="2"/>
    <rect x="240" y="55"  width="2" height="2"/>
    <rect x="285" y="20"  width="3" height="3"/>
    <rect x="330" y="60"  width="2" height="2"/>
    <rect x="370" y="35"  width="2" height="2"/>
    <rect x="40"  y="120" width="2" height="2"/>
    <rect x="95"  y="135" width="2" height="2"/>
    <rect x="200" y="120" width="2" height="2"/>
    <rect x="260" y="145" width="2" height="2"/>
    <rect x="350" y="130" width="2" height="2"/>
  </g>

  <!-- farthest mountain layer (lightest) -->
  <g fill="#6db399" opacity="0.85">
    <rect x="0"   y="160" width="50" height="200"/>
    <rect x="50"  y="140" width="50" height="200"/>
    <rect x="100" y="155" width="60" height="200"/>
    <rect x="160" y="125" width="70" height="200"/>
    <rect x="230" y="150" width="60" height="200"/>
    <rect x="290" y="135" width="60" height="200"/>
    <rect x="350" y="160" width="50" height="200"/>
  </g>

  <!-- mid mountain layer -->
  <g fill="#4a8a73">
    <rect x="0"   y="190" width="60" height="200"/>
    <rect x="60"  y="170" width="80" height="200"/>
    <rect x="140" y="200" width="50" height="200"/>
    <rect x="190" y="180" width="70" height="200"/>
    <rect x="260" y="195" width="60" height="200"/>
    <rect x="320" y="175" width="80" height="200"/>
  </g>

  <!-- near hills / platforms layer (darker green with pixel detail) -->
  <g>
    <!-- left hill -->
    <rect x="20"  y="230" width="160" height="100" fill="#2d5e4a"/>
    <rect x="40"  y="220" width="120" height="10"  fill="#2d5e4a"/>
    <rect x="60"  y="210" width="80"  height="10"  fill="#2d5e4a"/>
    <!-- pixel texture spots on left hill -->
    <rect x="40"  y="240" width="4" height="4" fill="#1f4634"/>
    <rect x="60"  y="250" width="6" height="4" fill="#1f4634"/>
    <rect x="90"  y="240" width="4" height="4" fill="#1f4634"/>
    <rect x="110" y="260" width="6" height="4" fill="#1f4634"/>
    <rect x="140" y="248" width="4" height="4" fill="#1f4634"/>
    <rect x="80"  y="280" width="6" height="4" fill="#1f4634"/>
    <rect x="120" y="290" width="4" height="4" fill="#1f4634"/>
    <rect x="50"  y="300" width="6" height="4" fill="#1f4634"/>

    <!-- right hill (smaller, stepped) -->
    <rect x="200" y="250" width="100" height="80"  fill="#2d5e4a"/>
    <rect x="220" y="240" width="60"  height="10"  fill="#2d5e4a"/>
    <!-- pixel texture spots -->
    <rect x="230" y="260" width="4" height="4" fill="#1f4634"/>
    <rect x="260" y="270" width="6" height="4" fill="#1f4634"/>
    <rect x="240" y="290" width="4" height="4" fill="#1f4634"/>
    <rect x="280" y="280" width="4" height="4" fill="#1f4634"/>
    <rect x="210" y="310" width="6" height="4" fill="#1f4634"/>
    <rect x="270" y="305" width="4" height="4" fill="#1f4634"/>
  </g>

  <!-- crate (upper right) -->
  <g>
    <rect x="318" y="92"  width="40" height="40" fill="#e8eef5"/>
    <rect x="318" y="92"  width="40" height="4"  fill="#94a3b8"/>
    <rect x="318" y="128" width="40" height="4"  fill="#64748b"/>
    <rect x="318" y="92"  width="4"  height="40" fill="#94a3b8"/>
    <rect x="354" y="92"  width="4"  height="40" fill="#64748b"/>
    <!-- inner dot -->
    <rect x="334" y="108" width="8"  height="8"  fill="#475569"/>
  </g>

  <!-- ground grass strip -->
  <g>
    <rect x="0" y="330" width="400" height="70" fill="#5fb893"/>
    <!-- grass texture (darker dots) -->
    <rect x="10"  y="345" width="4" height="3" fill="#2d7a5d"/>
    <rect x="30"  y="360" width="6" height="4" fill="#2d7a5d"/>
    <rect x="55"  y="340" width="4" height="3" fill="#2d7a5d"/>
    <rect x="80"  y="365" width="4" height="3" fill="#2d7a5d"/>
    <rect x="105" y="350" width="6" height="4" fill="#2d7a5d"/>
    <rect x="135" y="370" width="4" height="3" fill="#2d7a5d"/>
    <rect x="165" y="345" width="4" height="3" fill="#2d7a5d"/>
    <rect x="195" y="362" width="6" height="4" fill="#2d7a5d"/>
    <rect x="225" y="355" width="4" height="3" fill="#2d7a5d"/>
    <rect x="255" y="372" width="4" height="3" fill="#2d7a5d"/>
    <rect x="285" y="348" width="6" height="4" fill="#2d7a5d"/>
    <rect x="315" y="365" width="4" height="3" fill="#2d7a5d"/>
    <rect x="345" y="345" width="4" height="3" fill="#2d7a5d"/>
    <rect x="375" y="370" width="6" height="4" fill="#2d7a5d"/>
    <!-- larger darker patches -->
    <rect x="60"  y="380" width="10" height="6" fill="#2d7a5d"/>
    <rect x="200" y="385" width="12" height="6" fill="#2d7a5d"/>
    <rect x="320" y="382" width="10" height="6" fill="#2d7a5d"/>
  </g>

  <!-- pixel character (small, in center facing right with gun) -->
  <g>
    <!-- head -->
    <rect x="180" y="295" width="12" height="10" fill="#e8c89a"/>
    <!-- hair tuft -->
    <rect x="180" y="293" width="12" height="2"  fill="#a67c52"/>
    <rect x="178" y="296" width="2"  height="2"  fill="#a67c52"/>
    <!-- eye -->
    <rect x="186" y="299" width="2"  height="2"  fill="#0a0f24"/>
    <!-- body -->
    <rect x="178" y="305" width="16" height="14" fill="#d4a574"/>
    <!-- darker shading on body -->
    <rect x="178" y="305" width="2"  height="14" fill="#a67c52"/>
    <!-- belt -->
    <rect x="178" y="315" width="16" height="2"  fill="#5c3a1e"/>
    <!-- gun arm extending right -->
    <rect x="194" y="308" width="10" height="4"  fill="#3a3a3a"/>
    <rect x="204" y="309" width="3"  height="2"  fill="#2a2a2a"/>
    <!-- legs -->
    <rect x="178" y="319" width="6"  height="10" fill="#5c3a1e"/>
    <rect x="188" y="319" width="6"  height="10" fill="#5c3a1e"/>
    <!-- shoes -->
    <rect x="176" y="327" width="8"  height="3"  fill="#0a0f24"/>
    <rect x="188" y="327" width="8"  height="3"  fill="#0a0f24"/>
  </g>
</svg>
