<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Sky Stack</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,sans-serif;color:#f1f5f9;background:#020617;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;cursor:pointer}
  #stage{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}
  .hud{position:fixed;top:18px;left:0;right:0;display:flex;justify-content:center;pointer-events:none;z-index:5}
  .pill{background:rgba(15,23,42,.55);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:8px 22px;font-size:28px;font-weight:800;backdrop-filter:blur(8px);color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.4)}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.55);backdrop-filter:blur(10px);z-index:10;padding:20px}
  .card{background:rgba(15,23,42,.85);border:1px solid #1e293b;border-radius:18px;padding:30px;max-width:360px;text-align:center;box-shadow:0 30px 80px -20px rgba(0,0,0,.6)}
  h1{margin:0 0 8px;font-size:36px;background:linear-gradient(135deg,#ff6b35,#ffb627);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{margin:0 0 18px;color:#94a3b8;font-size:14px;line-height:1.5}
  .stats{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
  .stat{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);padding:8px 14px;border-radius:10px;font-size:13px;color:#fff}
  .stat b{display:block;font-size:20px;color:#ffb627}
  .btn{border:0;background:linear-gradient(135deg,#ff6b35,#ffb627);color:white;font-weight:700;font-size:18px;padding:14px 32px;border-radius:999px;cursor:pointer;box-shadow:0 12px 28px -10px rgba(255,107,53,.5);transition:transform .12s}
  .btn:hover{transform:scale(1.04)}
  .btn:active{transform:scale(.96)}
  .tip{position:fixed;bottom:24px;left:0;right:0;text-align:center;font-size:13px;color:rgba(255,255,255,.55);pointer-events:none;z-index:5;letter-spacing:.04em}
</style>
</head>
<body>
<div id="stage"></div>
<div class="hud"><span class="pill" id="score">0</span></div>
<div class="tip" id="tip">Tap, click, or press Space to drop</div>
<div class="overlay" id="overlay">
  <div class="card">
    <h1 id="title">Sky Stack</h1>
    <p id="msg">Drop each block to align with the one below.<br>Miss and the overhang chips away. How tall can you build?</p>
    <div class="stats" id="stats" style="display:none"></div>
    <button class="btn" id="btn">Start</button>
  </div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const stage = document.getElementById('stage');
const scoreEl = document.getElementById('score');
const overlay = document.getElementById('overlay');
const titleEl = document.getElementById('title');
const msgEl = document.getElementById('msg');
const statsEl = document.getElementById('stats');
const btn = document.getElementById('btn');
const tip = document.getElementById('tip');

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();

// Sky gradient via a tall background sphere shader
const skyGeo = new THREE.SphereGeometry(500, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    topColor: { value: new THREE.Color('#0b1224') },
    midColor: { value: new THREE.Color('#1e1b4b') },
    botColor: { value: new THREE.Color('#7c2d12') },
  },
  vertexShader: `varying vec3 vWorld; void main(){ vWorld = (modelMatrix * vec4(position, 1.0)).xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    varying vec3 vWorld;
    uniform vec3 topColor;
    uniform vec3 midColor;
    uniform vec3 botColor;
    void main(){
      float t = clamp((vWorld.y + 200.0) / 400.0, 0.0, 1.0);
      vec3 c = t > 0.5 ? mix(midColor, topColor, (t - 0.5) * 2.0) : mix(botColor, midColor, t * 2.0);
      gl_FragColor = vec4(c, 1.0);
    }`
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// stars (small instanced points)
{
  const N = 200;
  const positions = new Float32Array(N * 3);
  for (let i = 0; i < N; i++){
    const r = 200 + Math.random()*150;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.random()*Math.PI*0.5; // upper hemisphere
    positions[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1] = r*Math.cos(phi);
    positions[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const m = new THREE.PointsMaterial({ size: 1.2, color: 0xffffff, sizeAttenuation: true, transparent: true, opacity: 0.85 });
  scene.add(new THREE.Points(g, m));
}

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff0d6, 1.0);
sun.position.set(20, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 200;
sun.shadow.camera.left = -30;
sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30;
sun.shadow.camera.bottom = -30;
scene.add(sun);
const fill = new THREE.HemisphereLight(0xffb627, 0x1e1b4b, 0.35);
scene.add(fill);

// Camera
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(8, 8, 10);
camera.lookAt(0, 0, 0);

function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
addEventListener('resize', resize);

// Game state
const BASE_SIZE = 4;
const BLOCK_HEIGHT = 0.6;
let stack = [];        // array of meshes
let chips = [];        // falling pieces (visual effect)
let current = null;    // active moving block
let dir = 'x';         // alternating axis
let velocity = 0.07;
let alive = false;
let score = 0;
let cameraTargetY = 0;
let perfectStreak = 0;
let flashAlpha = 0;

function hueFor(i){
  const startHue = 18;
  const h = (startHue + i * 6) % 360;
  return new THREE.Color(`hsl(${h}, 70%, 58%)`);
}

function makeBlock(width, depth, x, y, z, color){
  const geo = new THREE.BoxGeometry(width, BLOCK_HEIGHT, depth);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.55, metalness: 0.05 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

function start(){
  // clear previous
  stack.forEach(b => scene.remove(b));
  chips.forEach(c => scene.remove(c.mesh));
  stack = []; chips = []; score = 0; perfectStreak = 0;
  scoreEl.textContent = '0';
  overlay.style.display = 'none';
  tip.style.opacity = '1';

  // base block
  const base = makeBlock(BASE_SIZE, BASE_SIZE, 0, -BLOCK_HEIGHT/2, 0, hueFor(0));
  stack.push({ mesh: base, width: BASE_SIZE, depth: BASE_SIZE, x: 0, z: 0 });

  spawnCurrent();
  alive = true;
  cameraTargetY = 0;
}

function spawnCurrent(){
  const last = stack[stack.length - 1];
  dir = stack.length % 2 === 1 ? 'x' : 'z';
  const startSide = dir === 'x' ? -8 : -8;
  const color = hueFor(stack.length);
  const x = dir === 'x' ? startSide : last.x;
  const z = dir === 'z' ? startSide : last.z;
  const y = (stack.length - 0.5) * BLOCK_HEIGHT;
  const mesh = makeBlock(last.width, last.depth, x, y, z, color);
  current = { mesh, width: last.width, depth: last.depth, x, z, y };
  velocity = 0.07 + Math.min(0.06, stack.length * 0.003);
  cameraTargetY = stack.length * BLOCK_HEIGHT;
}

function drop(){
  if (!alive || !current) return;
  const last = stack[stack.length - 1];
  let overhang, slicePos;
  if (dir === 'x'){
    const delta = current.x - last.x;
    const overlap = current.width - Math.abs(delta);
    if (overlap <= 0) return gameover();
    if (Math.abs(delta) < 0.06){
      // perfect — snap to last
      current.x = last.x;
      current.mesh.position.x = last.x;
      perfectStreak++;
      flashAlpha = 1;
      // grow back a little (cap to base size)
      const grow = Math.min(0.04, (BASE_SIZE - current.width) * 0.1);
      if (grow > 0){
        current.width += grow * 2;
        current.mesh.scale.x = current.width / last.width;
      }
    } else {
      perfectStreak = 0;
      const newWidth = overlap;
      const newX = (Math.max(current.x - current.width/2, last.x - last.width/2) + Math.min(current.x + current.width/2, last.x + last.width/2)) / 2;
      // chip = the cut-off piece
      const chipWidth = Math.abs(delta);
      const chipX = delta > 0 ? newX + newWidth/2 + chipWidth/2 : newX - newWidth/2 - chipWidth/2;
      spawnChip(chipWidth, current.depth, chipX, current.y, current.z, current.mesh.material.color, delta > 0 ? 1 : -1, 0);
      current.width = newWidth;
      current.x = newX;
      current.mesh.geometry.dispose();
      current.mesh.geometry = new THREE.BoxGeometry(newWidth, BLOCK_HEIGHT, current.depth);
      current.mesh.position.x = newX;
    }
  } else {
    const delta = current.z - last.z;
    const overlap = current.depth - Math.abs(delta);
    if (overlap <= 0) return gameover();
    if (Math.abs(delta) < 0.06){
      current.z = last.z;
      current.mesh.position.z = last.z;
      perfectStreak++;
      flashAlpha = 1;
      const grow = Math.min(0.04, (BASE_SIZE - current.depth) * 0.1);
      if (grow > 0){
        current.depth += grow * 2;
        current.mesh.scale.z = current.depth / last.depth;
      }
    } else {
      perfectStreak = 0;
      const newDepth = overlap;
      const newZ = (Math.max(current.z - current.depth/2, last.z - last.depth/2) + Math.min(current.z + current.depth/2, last.z + last.depth/2)) / 2;
      const chipDepth = Math.abs(delta);
      const chipZ = delta > 0 ? newZ + newDepth/2 + chipDepth/2 : newZ - newDepth/2 - chipDepth/2;
      spawnChip(current.width, chipDepth, current.x, current.y, chipZ, current.mesh.material.color, 0, delta > 0 ? 1 : -1);
      current.depth = newDepth;
      current.z = newZ;
      current.mesh.geometry.dispose();
      current.mesh.geometry = new THREE.BoxGeometry(current.width, BLOCK_HEIGHT, newDepth);
      current.mesh.position.z = newZ;
    }
  }
  stack.push(current);
  score++; scoreEl.textContent = score;
  tip.style.opacity = '0';
  current = null;
  spawnCurrent();
}

function spawnChip(w, d, x, y, z, color, vx, vz){
  const geo = new THREE.BoxGeometry(w, BLOCK_HEIGHT, d);
  const mat = new THREE.MeshStandardMaterial({ color: color.clone(), roughness: 0.55 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  m.castShadow = true;
  scene.add(m);
  chips.push({ mesh: m, vy: 0, vx: vx * 0.08, vz: vz * 0.08, omega: (Math.random()*0.06 - 0.03) });
}

function gameover(){
  alive = false;
  const best = +localStorage.getItem('skystack_best') || 0;
  if (score > best) localStorage.setItem('skystack_best', score);
  titleEl.textContent = score > 0 ? `${score} high!` : 'Missed!';
  msgEl.textContent = '';
  statsEl.style.display = 'flex';
  statsEl.innerHTML = `
    <div class="stat">Score<b>${score}</b></div>
    <div class="stat">Best<b>${Math.max(best, score)}</b></div>
  `;
  btn.textContent = 'Play again';
  overlay.style.display = 'flex';
  // make current block fall too
  if (current){
    chips.push({ mesh: current.mesh, vy: 0, vx: 0, vz: 0, omega: 0.05 });
    current = null;
  }
}

const clock = new THREE.Clock();
function animate(){
  const dt = Math.min(clock.getDelta(), 0.05);
  // move current block side-to-side
  if (alive && current){
    if (dir === 'x'){
      current.x += velocity;
      if (current.x > 8) { current.x = 8; velocity = -Math.abs(velocity); }
      if (current.x < -8) { current.x = -8; velocity = Math.abs(velocity); }
      current.mesh.position.x = current.x;
    } else {
      current.z += velocity;
      if (current.z > 8) { current.z = 8; velocity = -Math.abs(velocity); }
      if (current.z < -8) { current.z = -8; velocity = Math.abs(velocity); }
      current.mesh.position.z = current.z;
    }
  }
  // chips falling
  for (const c of chips){
    c.vy -= 0.025;
    c.mesh.position.y += c.vy;
    c.mesh.position.x += c.vx;
    c.mesh.position.z += c.vz;
    c.mesh.rotation.x += c.omega;
    c.mesh.rotation.z += c.omega * 0.7;
  }
  // drop offscreen chips
  chips = chips.filter(c => {
    if (c.mesh.position.y < -30){ scene.remove(c.mesh); c.mesh.geometry.dispose(); return false; }
    return true;
  });
  // camera follow
  const desiredY = cameraTargetY + 6;
  camera.position.y += (desiredY - camera.position.y) * 0.08;
  camera.lookAt(0, cameraTargetY, 0);
  // perfect flash
  if (flashAlpha > 0){
    renderer.toneMappingExposure = 1.0 + flashAlpha * 0.5;
    flashAlpha -= 0.05;
  } else {
    renderer.toneMappingExposure = 1.0;
  }
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

// input
function handleInput(e){
  if (e.target === btn || (e.target && e.target.closest && e.target.closest('.card'))) return;
  drop();
}
addEventListener('pointerdown', handleInput);
addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); drop(); } });
btn.addEventListener('click', start);

// initial scene render so the loading screen looks alive even before Start
start();
alive = false; // wait for explicit Start
overlay.style.display = 'flex';
animate();
</script>
</body>
</html>
