<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Snake</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; overflow:hidden; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; color:#f1f5f9;
    background: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(255,107,53,.15), transparent 60%),
                radial-gradient(ellipse 70% 50% at 80% 100%, rgba(255,182,39,.12), transparent 60%),
                linear-gradient(180deg, #020617, #0b1224);
    user-select:none; -webkit-user-select:none; touch-action:none;
    display:flex; align-items:center; justify-content:center; padding:12px;
  }
  .wrap { display:flex; flex-direction:column; gap:10px; max-width:min(95vh,95vw); width:100%; }
  .hud { display:flex; justify-content:space-between; align-items:center; }
  .pill { background:rgba(15,23,42,.7); border:1px solid #1e293b; border-radius:999px; padding:6px 14px; font-size:14px; font-weight:600; }
  .score { color:#ffb627; }
  .best  { color:#94a3b8; }
  canvas { width:100%; aspect-ratio:1/1; border-radius:14px; border:1px solid #1e293b; background:#0f172a; touch-action:none; }
  .overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(2,6,23,.7); backdrop-filter:blur(8px); z-index:10; }
  .card { background:rgba(15,23,42,.85); border:1px solid #1e293b; border-radius:18px; padding:28px; max-width:340px; text-align:center; }
  h1 { margin:0 0 8px; font-size:32px; background:linear-gradient(135deg,#ff6b35,#ffb627); -webkit-background-clip:text; background-clip:text; color:transparent; }
  p { margin:0 0 18px; color:#94a3b8; font-size:14px; line-height:1.5; }
  button { border:0; background:linear-gradient(135deg,#ff6b35,#ffb627); color:white; font-weight:700; font-size:16px; padding:12px 28px; border-radius:999px; cursor:pointer; box-shadow:0 8px 24px -8px rgba(255,107,53,.6); }
  button:active { transform:scale(.96); }
</style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div class="pill score">⭐ <span id="score">0</span></div>
    <div class="pill best">Best: <span id="best">0</span></div>
  </div>
  <canvas id="c" width="400" height="400"></canvas>
</div>
<div class="overlay" id="overlay">
  <div class="card">
    <h1 id="title">Snake</h1>
    <p id="msg">Use arrow keys, WASD, or swipe. Don't bite your tail.</p>
    <button id="btn">Play</button>
  </div>
</div>
<script>
(() => {
  const cv = document.getElementById('c'); const ctx = cv.getContext('2d');
  const SIZE = 20, COLS = 20, ROWS = 20;
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('title');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');
  let snake, dir, nextDir, food, score, best, alive, tick, sparks=[];
  best = +localStorage.getItem('snake_best') || 0; bestEl.textContent = best;
  function burst(x,y){
    for (let i=0;i<10;i++){
      const a = Math.random()*Math.PI*2, s = 1+Math.random()*2.5;
      sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1});
    }
  }

  function spawnFood() {
    while (true) {
      const f = { x: (Math.random()*COLS)|0, y: (Math.random()*ROWS)|0 };
      if (!snake.some(s => s.x===f.x && s.y===f.y)) return f;
    }
  }
  function reset() {
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1,y:0}; nextDir = dir;
    food = spawnFood(); score = 0; alive = true;
    scoreEl.textContent = '0';
  }
  function step() {
    if (!alive) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS || snake.some(s=>s.x===head.x&&s.y===head.y)) {
      alive = false; gameover(); return;
    }
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) { score++; scoreEl.textContent=score; burst(food.x*SIZE+SIZE/2, food.y*SIZE+SIZE/2); food = spawnFood(); }
    else snake.pop();
    sparks.forEach(s=>{ s.x+=s.vx; s.y+=s.vy; s.vx*=0.9; s.vy*=0.9; s.life-=0.06; });
    sparks = sparks.filter(s=>s.life>0);
    draw();
  }
  function draw() {
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,cv.width,cv.height);
    // food with glow
    ctx.shadowColor = '#ff6b35'; ctx.shadowBlur = 16;
    ctx.fillStyle = '#ff6b35';
    ctx.beginPath();
    ctx.arc(food.x*SIZE+SIZE/2, food.y*SIZE+SIZE/2, SIZE/2-2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // snake — gradient body from head accent to deep green
    snake.forEach((s,i)=>{
      const t = i / snake.length;
      if (i===0){
        ctx.shadowColor='#ffb627'; ctx.shadowBlur=12;
        ctx.fillStyle = '#ffb627';
      } else {
        ctx.shadowBlur=0;
        const r = Math.round(34 + (250-34)*Math.max(0, 0.5-t));
        const g = Math.round(197 - (197-182)*t);
        const b = Math.round(94 - 90*t);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
      }
      const pad = i===0 ? 1 : 2;
      ctx.fillRect(s.x*SIZE+pad, s.y*SIZE+pad, SIZE-pad*2, SIZE-pad*2);
    });
    ctx.shadowBlur = 0;
    sparks.forEach(s=>{
      ctx.fillStyle = `rgba(255,182,39,${s.life})`;
      ctx.fillRect(s.x-2, s.y-2, 4, 4);
    });
  }
  function gameover() {
    if (score > best) { best = score; localStorage.setItem('snake_best', best); bestEl.textContent = best; }
    title.textContent = 'Game over';
    msg.textContent = `Score ${score}. Best ${best}. Try again?`;
    btn.textContent = 'Play again';
    overlay.style.display = 'flex';
  }
  function start() {
    reset(); overlay.style.display = 'none';
    if (tick) clearInterval(tick);
    tick = setInterval(step, 90);
    draw();
  }
  btn.addEventListener('click', start);

  const turn = (x,y) => { if (dir.x !== -x || dir.y !== -y) nextDir = {x,y}; };
  addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    const k = e.key;
    if (k==='ArrowUp'||k==='w'||k==='W') turn(0,-1);
    else if (k==='ArrowDown'||k==='s'||k==='S') turn(0,1);
    else if (k==='ArrowLeft'||k==='a'||k==='A') turn(-1,0);
    else if (k==='ArrowRight'||k==='d'||k==='D') turn(1,0);
  });
  // swipe
  let tx=0, ty=0;
  cv.addEventListener('touchstart', e => { const t=e.touches[0]; tx=t.clientX; ty=t.clientY; }, {passive:true});
  cv.addEventListener('touchend', e => {
    const t=e.changedTouches[0]; const dx=t.clientX-tx, dy=t.clientY-ty;
    if (Math.abs(dx) > Math.abs(dy)) turn(dx>0?1:-1, 0);
    else turn(0, dy>0?1:-1);
  });

  reset(); draw();
})();
</script>
</body>
</html>
