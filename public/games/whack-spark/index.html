<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Whack-a-Spark</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:system-ui,sans-serif;color:#f1f5f9;
    background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,107,53,.15),transparent 60%),
               linear-gradient(180deg,#020617,#0b1224);
    display:flex;align-items:center;justify-content:center;padding:16px;user-select:none;-webkit-user-select:none;touch-action:manipulation}
  .wrap{display:flex;flex-direction:column;gap:14px;width:100%;max-width:520px}
  .hud{display:flex;justify-content:space-between;gap:8px}
  .pill{background:rgba(15,23,42,.7);border:1px solid #1e293b;border-radius:999px;padding:6px 14px;font-size:14px;font-weight:600}
  .score{color:#ffb627}.time{color:#ff6b35}.miss{color:#ef4444}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .hole{position:relative;aspect-ratio:1;background:radial-gradient(circle at 50% 70%,#0a0f1f 0%,#1e293b 70%,#0a0f1f 100%);border-radius:50%;overflow:hidden;border:1px solid #1e293b;cursor:pointer}
  .spark{position:absolute;left:50%;bottom:-100%;width:65%;height:65%;transform:translateX(-50%);
    background:radial-gradient(circle,#fff 0%,#ffb627 35%,#ff6b35 70%,transparent 80%);
    border-radius:50%;box-shadow:0 0 32px rgba(255,182,39,.7);transition:bottom .25s ease-out}
  .hole.up .spark{bottom:15%}
  .hole.bomb .spark{background:radial-gradient(circle,#fff 0%,#ef4444 40%,#7f1d1d 80%,transparent 90%);box-shadow:0 0 32px rgba(239,68,68,.7)}
  .hit{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-weight:800;font-size:20px;color:#ffb627;pointer-events:none;animation:up .8s ease-out forwards}
  @keyframes up{from{opacity:1;top:30%}to{opacity:0;top:-30%}}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.7);backdrop-filter:blur(8px);z-index:10}
  .card{background:rgba(15,23,42,.85);border:1px solid #1e293b;border-radius:18px;padding:28px;max-width:320px;text-align:center}
  h1{margin:0 0 8px;font-size:30px;background:linear-gradient(135deg,#ff6b35,#ffb627);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{margin:0 0 18px;color:#94a3b8;font-size:14px}
  .btn{border:0;background:linear-gradient(135deg,#ff6b35,#ffb627);color:white;font-weight:700;padding:12px 28px;border-radius:999px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div class="pill score">⭐ <span id="score">0</span></div>
    <div class="pill miss">❌ <span id="miss">0</span>/5</div>
    <div class="pill time">⏱ <span id="time">30</span>s</div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<div class="overlay" id="overlay">
  <div class="card">
    <h1 id="title">Whack-a-Spark</h1>
    <p id="msg">Tap the orange sparks. AVOID the red bombs.<br>3 strikes and you're out.</p>
    <button class="btn" id="btn">Start</button>
  </div>
</div>
<script>
(() => {
  const grid = document.getElementById('grid');
  const overlay = document.getElementById('overlay'), titleEl=document.getElementById('title'), msgEl=document.getElementById('msg'), btn=document.getElementById('btn');
  const scoreEl=document.getElementById('score'), timeEl=document.getElementById('time'), missEl=document.getElementById('miss');
  const HOLES=9, MAX_MISS=5;
  let holes=[], score, misses, timeLeft, running, spawnT, timerT;

  function build(){
    grid.innerHTML='';
    holes = [];
    for (let i=0;i<HOLES;i++){
      const el = document.createElement('div'); el.className='hole';
      const sp = document.createElement('div'); sp.className='spark';
      el.appendChild(sp);
      el.addEventListener('pointerdown', (e) => { e.preventDefault(); hit(i); });
      grid.appendChild(el);
      holes.push({el, sp, active:false, type:null});
    }
  }
  function spawn(){
    if (!running) return;
    const free = holes.map((h,i)=>i).filter(i => !holes[i].active);
    if (free.length === 0) return scheduleSpawn();
    const idx = free[(Math.random()*free.length)|0];
    const h = holes[idx];
    h.active = true;
    h.type = Math.random() < 0.18 ? 'bomb' : 'spark';
    h.el.classList.add('up');
    if (h.type === 'bomb') h.el.classList.add('bomb');
    const showFor = 700 + Math.random()*900 - Math.min(500, score*15);
    h.timeout = setTimeout(() => {
      h.el.classList.remove('up','bomb');
      h.active = false; h.type=null;
    }, Math.max(450, showFor));
    scheduleSpawn();
  }
  function scheduleSpawn(){
    if (!running) return;
    const delay = Math.max(300, 700 - score*8);
    spawnT = setTimeout(spawn, delay);
  }
  function hit(i){
    if (!running) return;
    const h = holes[i];
    if (!h.active) { miss(); return; }
    if (h.type === 'bomb'){
      const x = document.createElement('div'); x.className='hit'; x.textContent='-1'; x.style.color='#ef4444';
      h.el.appendChild(x); setTimeout(()=>x.remove(),800);
      miss();
    } else {
      score++; scoreEl.textContent = score;
      const p = document.createElement('div'); p.className='hit'; p.textContent='+1';
      h.el.appendChild(p); setTimeout(()=>p.remove(),800);
    }
    clearTimeout(h.timeout);
    h.el.classList.remove('up','bomb'); h.active=false; h.type=null;
  }
  function miss(){
    misses++; missEl.textContent = `${misses}`;
    if (misses >= MAX_MISS) end();
  }
  function start(){
    score=0; misses=0; timeLeft=30; running=true;
    scoreEl.textContent=0; missEl.textContent='0'; timeEl.textContent=30;
    overlay.style.display='none';
    holes.forEach(h => { h.el.classList.remove('up','bomb'); h.active=false; });
    scheduleSpawn();
    timerT = setInterval(()=>{ timeLeft--; timeEl.textContent=timeLeft; if (timeLeft<=0) end(); },1000);
  }
  function end(){
    running=false; clearTimeout(spawnT); clearInterval(timerT);
    holes.forEach(h => { clearTimeout(h.timeout); h.el.classList.remove('up','bomb'); });
    const best = +localStorage.getItem('whack_best')||0;
    if (score > best) localStorage.setItem('whack_best', score);
    titleEl.textContent = misses>=MAX_MISS ? 'Out!' : "Time's up!";
    msgEl.textContent = `Score: ${score} · Best: ${Math.max(best,score)}`;
    btn.textContent='Play again';
    overlay.style.display='flex';
  }
  build();
  btn.addEventListener('click', start);
})();
</script>
</body>
</html>
