<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Sudoku</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:system-ui,sans-serif;color:#f1f5f9;
    background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,107,53,.15),transparent 60%),
               linear-gradient(180deg,#020617,#0b1224);
    display:flex;align-items:center;justify-content:center;padding:14px;user-select:none;-webkit-user-select:none}
  .wrap{display:flex;flex-direction:column;gap:12px;width:100%;max-width:480px}
  .hud{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .pill{background:rgba(15,23,42,.7);border:1px solid #1e293b;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600}
  .time{color:#ff6b35}.diff{color:#ffb627}
  select{background:rgba(15,23,42,.7);border:1px solid #1e293b;border-radius:8px;color:#fff;padding:6px 10px;font-size:13px}
  .board{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:#475569;border:2px solid #475569;border-radius:6px;aspect-ratio:1}
  .cell{aspect-ratio:1;background:#0f172a;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;cursor:pointer;transition:background .1s}
  .cell.given{color:#f1f5f9;cursor:default;background:#1e293b}
  .cell.user{color:#ffb627}
  .cell.selected{background:rgba(255,107,53,.25)}
  .cell.same{background:rgba(255,182,39,.12)}
  .cell.error{color:#ef4444}
  .cell.b-r-strong{border-right:2px solid #475569}
  .cell.b-b-strong{border-bottom:2px solid #475569}
  .pad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .num{background:rgba(15,23,42,.7);border:1px solid #1e293b;color:#fff;padding:14px 0;font-weight:800;font-size:18px;border-radius:8px;cursor:pointer;transition:transform .1s}
  .num:hover{border-color:#ff6b35}
  .num:active{transform:scale(.95)}
  .num.erase{color:#ef4444}
  .btn{border:0;background:linear-gradient(135deg,#ff6b35,#ffb627);color:white;font-weight:700;padding:10px 22px;border-radius:999px;cursor:pointer;align-self:center}
  .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(2,6,23,.7);backdrop-filter:blur(8px);z-index:10}
  .overlay.show{display:flex}
  .card{background:rgba(15,23,42,.85);border:1px solid #1e293b;border-radius:18px;padding:28px;max-width:320px;text-align:center}
  h1{margin:0 0 8px;font-size:30px;background:linear-gradient(135deg,#ff6b35,#ffb627);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{margin:0 0 18px;color:#94a3b8;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div class="pill time">⏱ <span id="time">0</span>s</div>
    <select id="diff"><option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option></select>
    <button class="btn" id="new" style="padding:6px 14px;font-size:13px;align-self:auto">New</button>
  </div>
  <div class="board" id="board"></div>
  <div class="pad">
    <button class="num" data-n="1">1</button>
    <button class="num" data-n="2">2</button>
    <button class="num" data-n="3">3</button>
    <button class="num" data-n="4">4</button>
    <button class="num" data-n="5">5</button>
    <button class="num" data-n="6">6</button>
    <button class="num" data-n="7">7</button>
    <button class="num" data-n="8">8</button>
    <button class="num" data-n="9">9</button>
    <button class="num erase" data-n="0">⌫</button>
  </div>
</div>
<div class="overlay" id="overlay"><div class="card"><h1>Solved!</h1><p id="result"></p><button class="btn" id="again">New puzzle</button></div></div>
<script>
(() => {
  const boardEl = document.getElementById('board');
  const timeEl = document.getElementById('time');
  const diffSel = document.getElementById('diff');
  const overlay = document.getElementById('overlay');
  const resultEl = document.getElementById('result');
  let solution, puzzle, given, selected = null, t0, timer;

  function shuffle(a){ for (let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

  function fillBoard(b){
    function fill(i=0){
      if (i === 81) return true;
      const r = (i/9)|0, c = i%9;
      for (const n of shuffle([1,2,3,4,5,6,7,8,9])){
        if (valid(b, r, c, n)){
          b[r][c] = n;
          if (fill(i+1)) return true;
          b[r][c] = 0;
        }
      }
      return false;
    }
    return fill();
  }
  function valid(b, r, c, n){
    for (let i=0;i<9;i++){ if (b[r][i]===n || b[i][c]===n) return false; }
    const br = (r/3|0)*3, bc = (c/3|0)*3;
    for (let i=0;i<3;i++) for (let j=0;j<3;j++) if (b[br+i][bc+j]===n) return false;
    return true;
  }
  function makePuzzle(diff){
    solution = Array.from({length:9}, () => Array(9).fill(0));
    fillBoard(solution);
    puzzle = solution.map(row => row.slice());
    given = Array.from({length:9}, () => Array(9).fill(true));
    const remove = { easy: 35, medium: 45, hard: 55 }[diff] || 45;
    const positions = shuffle(Array.from({length:81}, (_,i) => i));
    for (let k=0;k<remove;k++){
      const p = positions[k], r=(p/9)|0, c=p%9;
      puzzle[r][c] = 0; given[r][c] = false;
    }
  }
  function render(){
    boardEl.innerHTML='';
    for (let r=0;r<9;r++) for (let c=0;c<9;c++){
      const el = document.createElement('div'); el.className='cell';
      if (given[r][c]) el.classList.add('given');
      else if (puzzle[r][c]) el.classList.add('user');
      el.textContent = puzzle[r][c] || '';
      if (c===2||c===5) el.classList.add('b-r-strong');
      if (r===2||r===5) el.classList.add('b-b-strong');
      if (puzzle[r][c] && solution[r][c] && puzzle[r][c] !== solution[r][c] && !given[r][c]) el.classList.add('error');
      el.addEventListener('click', () => selectCell(r,c));
      boardEl.appendChild(el);
    }
    if (selected){
      const idx = selected.r*9 + selected.c;
      boardEl.children[idx].classList.add('selected');
      const val = puzzle[selected.r][selected.c];
      if (val){
        for (let r=0;r<9;r++) for (let c=0;c<9;c++) if (puzzle[r][c]===val) boardEl.children[r*9+c].classList.add('same');
      }
    }
  }
  function selectCell(r,c){ selected = {r,c}; render(); }
  function setNum(n){
    if (!selected) return;
    const {r,c} = selected;
    if (given[r][c]) return;
    if (!t0) startTimer();
    puzzle[r][c] = n;
    render();
    if (solved()) win();
  }
  function solved(){
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) if (puzzle[r][c] !== solution[r][c]) return false;
    return true;
  }
  function startTimer(){ t0 = Date.now(); timer = setInterval(() => timeEl.textContent = Math.floor((Date.now()-t0)/1000), 250); }
  function win(){
    clearInterval(timer);
    resultEl.textContent = `${diffSel.value} · ${timeEl.textContent}s`;
    overlay.classList.add('show');
  }
  function reset(){
    clearInterval(timer); t0=null; timeEl.textContent=0;
    selected=null;
    makePuzzle(diffSel.value);
    render();
  }
  document.querySelectorAll('.num').forEach(b => b.addEventListener('click', () => setNum(+b.dataset.n)));
  document.getElementById('new').addEventListener('click', () => { overlay.classList.remove('show'); reset(); });
  document.getElementById('again').addEventListener('click', () => { overlay.classList.remove('show'); reset(); });
  addEventListener('keydown', e => {
    if (/^[1-9]$/.test(e.key)) setNum(+e.key);
    else if (e.key === '0' || e.key === 'Backspace' || e.key === 'Delete') setNum(0);
    else if (selected){
      let {r,c} = selected;
      if (e.key==='ArrowUp' && r>0) r--;
      else if (e.key==='ArrowDown' && r<8) r++;
      else if (e.key==='ArrowLeft' && c>0) c--;
      else if (e.key==='ArrowRight' && c<8) c++;
      else return;
      selected={r,c}; render();
    }
  });
  reset();
})();
</script>
</body>
</html>
