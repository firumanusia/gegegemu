<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Sparkstorm</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,sans-serif;color:#f1f5f9;background:#020617;
    display:flex;align-items:center;justify-content:center;padding:12px;user-select:none;-webkit-user-select:none;touch-action:none;cursor:crosshair}
  canvas{display:block;width:100%;max-width:min(100%,calc(95vh*16/9));aspect-ratio:16/9;border-radius:14px;border:1px solid #1e293b;background:#020617;box-shadow:0 0 80px -20px rgba(255,107,53,.4)}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.55);backdrop-filter:blur(10px);z-index:10;padding:20px;cursor:default}
  .card{background:rgba(15,23,42,.85);border:1px solid #1e293b;border-radius:18px;padding:30px;max-width:360px;text-align:center;box-shadow:0 30px 80px -20px rgba(0,0,0,.6)}
  h1{margin:0 0 8px;font-size:34px;background:linear-gradient(135deg,#ff6b35,#ffb627);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{margin:0 0 18px;color:#94a3b8;font-size:14px;line-height:1.5}
  .stats{display:flex;gap:10px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
  .stat{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);padding:8px 14px;border-radius:10px;font-size:13px}
  .stat b{display:block;font-size:20px;color:#ffb627}
  .btn{border:0;background:linear-gradient(135deg,#ff6b35,#ffb627);color:white;font-weight:700;font-size:18px;padding:14px 32px;border-radius:999px;cursor:pointer;box-shadow:0 12px 28px -10px rgba(255,107,53,.5)}
</style>
</head>
<body>
<canvas id="c" width="1280" height="720"></canvas>
<div class="overlay" id="overlay">
  <div class="card">
    <h1 id="title">Sparkstorm</h1>
    <p id="msg">Survive the storm.<br><br><b>WASD</b> or <b>arrow keys</b> to move.<br>Mouse to aim, <b>click</b> or <b>space</b> to fire.</p>
    <div class="stats" id="stats" style="display:none"></div>
    <button class="btn" id="btn">Launch</button>
  </div>
</div>
<script>
(() => {
  const cv = document.getElementById('c'); const ctx = cv.getContext('2d');
  const overlay = document.getElementById('overlay'), titleEl = document.getElementById('title'), msgEl = document.getElementById('msg'), statsEl = document.getElementById('stats'), btn = document.getElementById('btn');
  const W = 1280, H = 720;

  // input state
  const keys = {};
  let mouseX = W/2, mouseY = H/2, mouseDown = false;
  addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if ([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase())) e.preventDefault(); });
  addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });
  function updateMouse(e){
    const r = cv.getBoundingClientRect();
    mouseX = (e.clientX - r.left) / r.width  * W;
    mouseY = (e.clientY - r.top)  / r.height * H;
  }
  cv.addEventListener('mousemove', updateMouse);
  cv.addEventListener('mousedown', e => { mouseDown = true; updateMouse(e); });
  cv.addEventListener('mouseup',   () => mouseDown = false);
  cv.addEventListener('touchstart', e => { mouseDown = true; const t=e.touches[0]; updateMouse(t); e.preventDefault(); }, {passive:false});
  cv.addEventListener('touchmove',  e => { const t=e.touches[0]; updateMouse(t); e.preventDefault(); }, {passive:false});
  cv.addEventListener('touchend',   () => mouseDown = false);

  // stars
  const stars = [];
  for (let i=0;i<140;i++) stars.push({ x:Math.random()*W, y:Math.random()*H, r:0.5+Math.random()*1.6, a:0.3+Math.random()*0.6, s:0.05+Math.random()*0.25 });

  // state
  let player, bullets, enemies, sparks, score, lives, wave, killsThisWave, spawnT, alive, gameOver, last, shootCooldown;

  function reset(){
    player = { x: W/2, y: H/2, r: 16, angle: 0, vx: 0, vy: 0, speed: 360, hitTimer: 0 };
    bullets = []; enemies = []; sparks = [];
    score = 0; lives = 3; wave = 1; killsThisWave = 0;
    spawnT = 0; shootCooldown = 0;
    alive = true; gameOver = false;
    last = performance.now();
  }

  function spawnEnemy(){
    // pick edge
    const edge = (Math.random()*4)|0;
    let x, y;
    if (edge===0){ x = -30; y = Math.random()*H; }
    else if (edge===1){ x = W+30; y = Math.random()*H; }
    else if (edge===2){ x = Math.random()*W; y = -30; }
    else { x = Math.random()*W; y = H+30; }
    const types = [
      { color:'#ef4444', r:14, hp:1, speed:90,  score:1 },
      { color:'#fb923c', r:18, hp:2, speed:75,  score:2 },
      { color:'#a855f7', r:11, hp:1, speed:130, score:2 },
    ];
    const t = types[(Math.random()*Math.min(types.length, 1 + Math.floor(wave/2)))|0];
    enemies.push({ x, y, r:t.r, color:t.color, hp:t.hp, speed:t.speed + wave*5, score:t.score, angle:Math.random()*Math.PI*2 });
  }

  function burst(x, y, color, count){
    for (let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const s = 80 + Math.random()*220;
      sparks.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, color });
    }
  }

  function fire(){
    if (shootCooldown > 0) return;
    shootCooldown = 0.14;
    const a = Math.atan2(mouseY - player.y, mouseX - player.x);
    bullets.push({ x: player.x + Math.cos(a)*player.r, y: player.y + Math.sin(a)*player.r, vx: Math.cos(a)*900, vy: Math.sin(a)*900, life: 1.0 });
    // small recoil burst
    sparks.push({ x: player.x + Math.cos(a)*player.r, y: player.y + Math.sin(a)*player.r, vx: -Math.cos(a)*60, vy: -Math.sin(a)*60, life: 0.4, color: '#ffe27a' });
  }

  function step(dt){
    if (!alive) return;
    // input
    let mx = 0, my = 0;
    if (keys['w'] || keys['arrowup'])    my -= 1;
    if (keys['s'] || keys['arrowdown'])  my += 1;
    if (keys['a'] || keys['arrowleft'])  mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;
    if (mx || my){ const m = Math.hypot(mx, my); mx /= m; my /= m; }
    // smooth movement
    const target_vx = mx * player.speed, target_vy = my * player.speed;
    const ease = 1 - Math.exp(-12 * dt);
    player.vx += (target_vx - player.vx) * ease;
    player.vy += (target_vy - player.vy) * ease;
    player.x = Math.max(player.r, Math.min(W - player.r, player.x + player.vx * dt));
    player.y = Math.max(player.r, Math.min(H - player.r, player.y + player.vy * dt));
    player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

    // fire
    shootCooldown = Math.max(0, shootCooldown - dt);
    if (mouseDown || keys[' ']) fire();

    // bullets
    for (const b of bullets){
      b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    }
    bullets = bullets.filter(b => b.life > 0 && b.x > -20 && b.x < W+20 && b.y > -20 && b.y < H+20);

    // enemies — move toward player
    for (const e of enemies){
      const a = Math.atan2(player.y - e.y, player.x - e.x);
      e.x += Math.cos(a) * e.speed * dt;
      e.y += Math.sin(a) * e.speed * dt;
      e.angle += dt * 2;
    }

    // bullet x enemy collision
    for (let i = enemies.length-1; i >= 0; i--){
      const e = enemies[i];
      let hit = false;
      for (let j = bullets.length-1; j >= 0; j--){
        const b = bullets[j];
        const dx = b.x - e.x, dy = b.y - e.y;
        if (dx*dx + dy*dy < (e.r + 4)*(e.r + 4)){
          bullets.splice(j, 1);
          e.hp--;
          if (e.hp <= 0) hit = true;
          else burst(b.x, b.y, e.color, 4);
          break;
        }
      }
      if (hit){
        burst(e.x, e.y, e.color, 16);
        score += e.score;
        killsThisWave++;
        enemies.splice(i, 1);
        if (killsThisWave >= 6 + wave * 3){ wave++; killsThisWave = 0; }
      }
    }

    // player x enemy collision
    if (player.hitTimer > 0) player.hitTimer -= dt;
    else {
      for (let i = enemies.length-1; i >= 0; i--){
        const e = enemies[i];
        const dx = e.x - player.x, dy = e.y - player.y;
        if (dx*dx + dy*dy < (e.r + player.r)*(e.r + player.r)){
          burst(e.x, e.y, '#ef4444', 22);
          enemies.splice(i, 1);
          lives--;
          player.hitTimer = 1.2;
          if (lives <= 0){ endGame(); return; }
          break;
        }
      }
    }

    // sparks
    for (const s of sparks){
      s.x += s.vx * dt; s.y += s.vy * dt;
      s.vx *= Math.pow(0.6, dt); s.vy *= Math.pow(0.6, dt);
      s.life -= dt * 1.6;
    }
    sparks = sparks.filter(s => s.life > 0);

    // spawning
    spawnT -= dt;
    if (spawnT <= 0){
      spawnEnemy();
      spawnT = Math.max(0.25, 1.3 - wave * 0.06);
    }

    // stars
    for (const s of stars){ s.x -= s.s; if (s.x < 0) s.x += W; }
  }

  function draw(){
    // bg
    ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, W, H);
    // vignette
    const g = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, W*0.65);
    g.addColorStop(0, 'rgba(255,107,53,0.04)'); g.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // stars
    for (const s of stars){ ctx.fillStyle = `rgba(255,255,255,${s.a})`; ctx.fillRect(s.x, s.y, s.r, s.r); }

    // sparks
    for (const s of sparks){
      ctx.fillStyle = s.color; ctx.globalAlpha = Math.max(0, s.life);
      ctx.fillRect(s.x-2, s.y-2, 4, 4);
    }
    ctx.globalAlpha = 1;

    // enemies
    for (const e of enemies){
      ctx.save();
      ctx.translate(e.x, e.y); ctx.rotate(e.angle);
      ctx.shadowColor = e.color; ctx.shadowBlur = 14;
      ctx.fillStyle = e.color;
      // diamond shape
      ctx.beginPath();
      ctx.moveTo(0, -e.r);
      ctx.lineTo(e.r, 0);
      ctx.lineTo(0, e.r);
      ctx.lineTo(-e.r, 0);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillRect(-3, -3, 6, 6);
      ctx.restore();
    }

    // bullets
    for (const b of bullets){
      ctx.shadowColor = '#ffe27a'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#fff';
      ctx.fillRect(b.x-3, b.y-3, 6, 6);
      ctx.shadowBlur = 0;
    }

    // player
    if (!(player.hitTimer > 0 && ((player.hitTimer * 10) | 0) % 2)){
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.angle);
      ctx.shadowColor = '#ff6b35'; ctx.shadowBlur = 18;
      // hull
      const grad = ctx.createLinearGradient(-player.r, 0, player.r, 0);
      grad.addColorStop(0, '#9a3412'); grad.addColorStop(1, '#ffb627');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(player.r + 4, 0);
      ctx.lineTo(-player.r, -player.r * 0.8);
      ctx.lineTo(-player.r * 0.5, 0);
      ctx.lineTo(-player.r, player.r * 0.8);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      // cockpit
      ctx.fillStyle = '#ffe27a';
      ctx.beginPath(); ctx.arc(2, 0, 4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // HUD
    drawHUD();
  }

  function drawHUD(){
    // score pill (top-left)
    drawPill(20, 18, 200, 56, '#ff6b35', '★', 'SCORE', String(score));
    // wave pill (top-center)
    const wpw = 170;
    drawPill((W - wpw) / 2, 18, wpw, 56, '#a855f7', '◆', 'WAVE', String(wave));
    // lives hearts (top-right)
    const lx = W - 24, ly = 36;
    for (let i = 0; i < 3; i++){
      const x = lx - i * 32;
      ctx.fillStyle = i < lives ? '#ef4444' : 'rgba(239,68,68,0.18)';
      ctx.shadowColor = i < lives ? '#ef4444' : 'transparent'; ctx.shadowBlur = i < lives ? 10 : 0;
      drawHeart(x, ly, 11);
      ctx.shadowBlur = 0;
    }
  }
  function drawPill(x, y, w, h, accent, icon, label, value){
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    roundRect(x, y+3, w, h, h/2); ctx.fill();
    // body
    const g = ctx.createLinearGradient(x, y, x, y+h);
    g.addColorStop(0, 'rgba(28,36,70,0.92)'); g.addColorStop(1, 'rgba(11,18,36,0.92)');
    ctx.fillStyle = g;
    roundRect(x, y, w, h, h/2); ctx.fill();
    // border
    ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 1.5;
    roundRect(x+0.5, y+0.5, w-1, h-1, (h-1)/2); ctx.stroke();
    // icon disc
    const ir = h * 0.34, ix = x + h*0.5, iy = y + h*0.5;
    const ig = ctx.createLinearGradient(ix, iy-ir, ix, iy+ir);
    ig.addColorStop(0, lighten(accent, 0.25)); ig.addColorStop(1, accent);
    ctx.fillStyle = ig;
    ctx.beginPath(); ctx.arc(ix, iy, ir, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (ir * 1.2) + 'px system-ui, Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(icon, ix, iy+1);
    // label
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(147,160,198,0.95)'; ctx.font = '700 11px system-ui, Arial';
    ctx.fillText(label, x + h*0.95, y + 12);
    // value
    ctx.fillStyle = '#fff'; ctx.font = '800 22px system-ui, Arial';
    ctx.textBaseline = 'middle'; ctx.fillText(value, x + h*0.95, y + h*0.65);
  }
  function drawHeart(cx, cy, s){
    ctx.beginPath();
    ctx.moveTo(cx, cy + s*0.55);
    ctx.bezierCurveTo(cx, cy, cx-s, cy, cx-s, cy-s*0.4);
    ctx.bezierCurveTo(cx-s, cy-s, cx, cy-s, cx, cy-s*0.3);
    ctx.bezierCurveTo(cx, cy-s, cx+s, cy-s, cx+s, cy-s*0.4);
    ctx.bezierCurveTo(cx+s, cy, cx, cy, cx, cy + s*0.55);
    ctx.closePath(); ctx.fill();
  }
  function roundRect(x, y, w, h, r){
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
    ctx.arcTo(x+w, y, x+w, y+r, r); ctx.lineTo(x+w, y+h-r);
    ctx.arcTo(x+w, y+h, x+w-r, y+h, r); ctx.lineTo(x+r, y+h);
    ctx.arcTo(x, y+h, x, y+h-r, r); ctx.lineTo(x, y+r);
    ctx.arcTo(x, y, x+r, y, r); ctx.closePath();
  }
  function lighten(hex, amt){
    const c = hex.replace('#',''); const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
    const m = v => Math.min(255, Math.round(v + (255-v)*amt));
    return `rgb(${m(r)},${m(g)},${m(b)})`;
  }

  function endGame(){
    alive = false; gameOver = true;
    const best = +localStorage.getItem('sparkstorm_best') || 0;
    if (score > best) localStorage.setItem('sparkstorm_best', score);
    titleEl.textContent = 'Storm survived';
    msgEl.textContent = '';
    statsEl.style.display = 'flex';
    statsEl.innerHTML = `<div class="stat">Score<b>${score}</b></div><div class="stat">Wave<b>${wave}</b></div><div class="stat">Best<b>${Math.max(best, score)}</b></div>`;
    btn.textContent = 'Play again';
    overlay.style.display = 'flex';
  }
  function start(){ reset(); overlay.style.display = 'none'; }
  btn.addEventListener('click', start);

  function loop(t){
    const dt = Math.min(0.05, (t - last) / 1000);
    last = t;
    step(dt);
    draw();
    requestAnimationFrame(loop);
  }
  reset(); alive = false; gameOver = false;
  overlay.style.display = 'flex';
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
