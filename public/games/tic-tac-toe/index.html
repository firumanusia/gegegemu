<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Tic-Tac-Toe</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:system-ui,sans-serif;color:#f1f5f9;
    background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,107,53,.15),transparent 60%),
               linear-gradient(180deg,#020617,#0b1224);
    display:flex;align-items:center;justify-content:center;padding:16px;user-select:none;-webkit-user-select:none}
  .wrap{display:flex;flex-direction:column;gap:14px;width:100%;max-width:420px}
  .head{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .score{display:flex;gap:8px}
  .pill{background:rgba(15,23,42,.7);border:1px solid #1e293b;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600}
  .pill.you{color:#ffb627}.pill.cpu{color:#3b82f6}.pill.draw{color:#94a3b8}
  .mode select{background:rgba(15,23,42,.7);border:1px solid #1e293b;border-radius:8px;color:#fff;padding:6px 10px;font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;aspect-ratio:1}
  .cell{aspect-ratio:1;border:1px solid #1e293b;border-radius:12px;background:rgba(15,23,42,.6);font-size:64px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s,border-color .15s}
  .cell:hover{border-color:#ff6b35}
  .cell.X{color:#ff6b35;text-shadow:0 0 18px rgba(255,107,53,.6)}
  .cell.O{color:#3b82f6;text-shadow:0 0 18px rgba(59,130,246,.6)}
  .cell.win{background:rgba(255,107,53,.18);border-color:#ffb627}
  .status{text-align:center;font-size:18px;font-weight:700;min-height:28px}
  .gradient{background:linear-gradient(135deg,#ff6b35,#ffb627);-webkit-background-clip:text;background-clip:text;color:transparent}
  .btn{border:0;background:linear-gradient(135deg,#ff6b35,#ffb627);color:white;font-weight:700;padding:10px 22px;border-radius:999px;cursor:pointer;align-self:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="score">
      <div class="pill you">You <span id="ws">0</span></div>
      <div class="pill draw">Draws <span id="ds">0</span></div>
      <div class="pill cpu">CPU <span id="cs">0</span></div>
    </div>
    <div class="mode"><select id="diff"><option value="easy">Easy</option><option value="hard" selected>Hard</option></select></div>
  </div>
  <div class="status" id="status">Your turn (X)</div>
  <div class="grid" id="grid"></div>
  <button class="btn" id="reset">New round</button>
</div>
<script>
(() => {
  const grid = document.getElementById('grid');
  const statusEl = document.getElementById('status');
  const ws = document.getElementById('ws'), cs = document.getElementById('cs'), ds = document.getElementById('ds');
  const diff = document.getElementById('diff');
  let board, current, over;
  let wins=0, losses=0, draws=0;
  const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  function build(){
    grid.innerHTML='';
    board = Array(9).fill(''); current='X'; over=false;
    for (let i=0;i<9;i++){
      const c = document.createElement('div'); c.className='cell';
      c.addEventListener('click', () => move(i));
      grid.appendChild(c);
    }
    statusEl.innerHTML = 'Your turn <span class="gradient">(X)</span>';
  }
  function move(i){
    if (over || board[i] !== '' || current !== 'X') return;
    play(i, 'X');
    if (over) return;
    current = 'O';
    statusEl.textContent = 'CPU thinking…';
    setTimeout(cpu, 380);
  }
  function play(i, p){
    board[i] = p;
    const c = grid.children[i]; c.textContent = p; c.classList.add(p);
    const win = winner();
    if (win){ over=true; markWin(win); endRound(p); return; }
    if (board.every(x => x !== '')){ over=true; endRound(null); return; }
  }
  function winner(){
    for (const line of LINES){
      const [a,b,c] = line;
      if (board[a] && board[a]===board[b] && board[b]===board[c]) return line;
    }
    return null;
  }
  function markWin(line){ line.forEach(i => grid.children[i].classList.add('win')); }
  function endRound(p){
    if (p === 'X'){ wins++; ws.textContent=wins; statusEl.innerHTML='<span class="gradient">You win!</span>'; }
    else if (p === 'O'){ losses++; cs.textContent=losses; statusEl.textContent='CPU wins.'; }
    else { draws++; ds.textContent=draws; statusEl.textContent="It's a draw."; }
  }
  function cpu(){
    let i;
    if (diff.value === 'easy'){
      const free = board.map((v,i)=>v===''?i:-1).filter(x=>x>=0);
      i = free[(Math.random()*free.length)|0];
    } else {
      i = bestMove();
    }
    play(i, 'O'); if (!over){ current='X'; statusEl.innerHTML='Your turn <span class="gradient">(X)</span>'; }
  }
  function bestMove(){
    // minimax
    let best = -Infinity, m = 0;
    for (let i=0;i<9;i++) if (board[i]===''){
      board[i]='O'; const s = mini(false); board[i]='';
      if (s > best){ best = s; m = i; }
    }
    return m;
  }
  function mini(isMax){
    const w = winner();
    if (w){ return board[w[0]] === 'O' ? 10 : -10; }
    if (board.every(x=>x!=='')) return 0;
    let best = isMax ? -Infinity : Infinity;
    for (let i=0;i<9;i++) if (board[i]===''){
      board[i] = isMax ? 'O' : 'X';
      const s = mini(!isMax);
      board[i]='';
      best = isMax ? Math.max(best,s) : Math.min(best,s);
    }
    return best;
  }
  document.getElementById('reset').addEventListener('click', build);
  build();
})();
</script>
</body>
</html>
