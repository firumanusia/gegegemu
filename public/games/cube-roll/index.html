<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Cube Roll</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,sans-serif;color:#fff;background:#020617;user-select:none;-webkit-user-select:none;touch-action:none}
  #stage{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}
  .hud{position:fixed;top:18px;left:0;right:0;display:flex;justify-content:space-between;padding:0 22px;pointer-events:none;z-index:5}
  .pill{background:rgba(15,23,42,.55);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:6px 16px;font-size:16px;font-weight:800;backdrop-filter:blur(8px);text-shadow:0 2px 6px rgba(0,0,0,.4)}
  .score{color:#ffb627}.time{color:#ff6b35}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.5);backdrop-filter:blur(10px);z-index:10;padding:20px}
  .card{background:rgba(15,23,42,.85);border:1px solid #1e293b;border-radius:18px;padding:30px;max-width:360px;text-align:center;box-shadow:0 30px 80px -20px rgba(0,0,0,.6)}
  h1{margin:0 0 8px;font-size:34px;background:linear-gradient(135deg,#ff6b35,#ffb627);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{margin:0 0 18px;color:#94a3b8;font-size:14px;line-height:1.5}
  .stats{display:flex;gap:10px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
  .stat{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);padding:8px 14px;border-radius:10px;font-size:13px}
  .stat b{display:block;font-size:20px;color:#ffb627}
  .btn{border:0;background:linear-gradient(135deg,#ff6b35,#ffb627);color:white;font-weight:700;font-size:18px;padding:14px 32px;border-radius:999px;cursor:pointer;box-shadow:0 12px 28px -10px rgba(255,107,53,.5)}
  .tip{position:fixed;bottom:24px;left:0;right:0;text-align:center;font-size:13px;color:rgba(255,255,255,.5);pointer-events:none;z-index:5}
</style>
</head>
<body>
<div id="stage"></div>
<div class="hud">
  <span class="pill score">⭐ <span id="score">0</span>/<span id="total">0</span></span>
  <span class="pill time">⏱ <span id="time">0</span>s</span>
</div>
<div class="tip">WASD / arrow keys / tilt to roll</div>
<div class="overlay" id="overlay">
  <div class="card">
    <h1 id="title">Cube Roll</h1>
    <p id="msg">Roll the ball along the platforms.<br>Collect every gem. Don't fall off.</p>
    <div class="stats" id="stats" style="display:none"></div>
    <button class="btn" id="btn">Start</button>
  </div>
</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

const stage = document.getElementById('stage');
const overlay = document.getElementById('overlay'), titleEl = document.getElementById('title'), msgEl = document.getElementById('msg'), statsEl = document.getElementById('stats'), btn = document.getElementById('btn');
const scoreEl = document.getElementById('score'), totalEl = document.getElementById('total'), timeEl = document.getElementById('time');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1224);
scene.fog = new THREE.Fog(0x0b1224, 30, 80);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 200);

function resize(){ renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); }
resize(); addEventListener('resize', resize);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sun = new THREE.DirectionalLight(0xffe6c0, 1.0); sun.position.set(20, 30, 10); sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024); sun.shadow.camera.near = 1; sun.shadow.camera.far = 100;
sun.shadow.camera.left = -30; sun.shadow.camera.right = 30; sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -30;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xffb627, 0x1e1b4b, 0.3));

// Build level — tilework path with gems
const platforms = [];
function addPlatform(x, y, z, w=4, d=4){
  const geo = new THREE.BoxGeometry(w, 0.6, d);
  const hue = (x*7 + z*5) % 360;
  const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color(`hsl(${hue}, 35%, 50%)`), roughness: 0.7 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  m.receiveShadow = true;
  m.castShadow = true;
  scene.add(m);
  platforms.push({ mesh: m, minX: x - w/2, maxX: x + w/2, minZ: z - d/2, maxZ: z + d/2, top: y + 0.3, color: mat.color });
  return m;
}

// design a winding path
const path = [
  [0,0,0,6,6],
  [0,0,-6,4,4], [0,0,-10,4,4], [4,0,-12,4,4], [8,0,-14,4,4],
  [12,0,-12,4,4], [14,0,-8,4,4], [12,0,-4,4,4], [16,0,-4,4,4],
  [20,-1,-4,4,4], [22,-1,-8,4,4], [22,-1,-12,4,4], [22,-1,-16,4,4],
  [26,-1,-18,4,4], [30,-1,-18,4,4], [34,-1,-18,5,5]
];
path.forEach(([x,y,z,w,d]) => addPlatform(x, y, z, w, d));

// gems on certain platforms
const gems = [];
function addGem(x, y, z){
  const geo = new THREE.OctahedronGeometry(0.4, 0);
  const mat = new THREE.MeshStandardMaterial({ color: 0xffb627, emissive: 0xff6b35, emissiveIntensity: 0.8, roughness: 0.2, metalness: 0.6 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y + 1, z);
  m.castShadow = true;
  scene.add(m);
  gems.push({ mesh: m, collected: false, t: Math.random()*Math.PI*2 });
}
[[0,0,-6],[8,0,-14],[14,0,-8],[16,0,-4],[22,-1,-12],[26,-1,-18],[34,-1,-18]].forEach(p => addGem(...p));
totalEl.textContent = gems.length;

// Goal — final platform glows
const goalGeo = new THREE.RingGeometry(1.6, 1.9, 32);
const goalMat = new THREE.MeshBasicMaterial({ color: 0x22c55e, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
const goal = new THREE.Mesh(goalGeo, goalMat);
goal.rotation.x = -Math.PI/2;
goal.position.set(34, -0.6, -18);
scene.add(goal);

// Ball
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(0.42, 32, 24),
  new THREE.MeshStandardMaterial({ color: 0xffe27a, emissive: 0xff6b35, emissiveIntensity: 0.4, roughness: 0.25, metalness: 0.5 })
);
ball.castShadow = true;
ball.position.set(0, 0.72, 0);
scene.add(ball);

let velocity = new THREE.Vector3();
let alive = false, won = false;
let collected = 0;
let elapsed = 0;
const keys = {};
addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (['arrowleft','arrowright','arrowup','arrowdown',' '].includes(e.key.toLowerCase())) e.preventDefault(); });
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// touch — pad direction relative to center
let touchDX = 0, touchDZ = 0, touchActive = false;
addEventListener('pointerdown', e => {
  if (e.target.closest && e.target.closest('.card')) return;
  touchActive = true;
});
addEventListener('pointermove', e => {
  if (!touchActive) return;
  touchDX = (e.clientX / innerWidth) * 2 - 1;
  touchDZ = -((e.clientY / innerHeight) * 2 - 1);
});
addEventListener('pointerup', () => { touchActive = false; touchDX = 0; touchDZ = 0; });

btn.addEventListener('click', start);

function reset(){
  ball.position.set(0, 0.72, 0);
  velocity.set(0, 0, 0);
  collected = 0; scoreEl.textContent = '0';
  elapsed = 0; timeEl.textContent = '0';
  gems.forEach(g => { g.collected = false; g.mesh.visible = true; });
  alive = true; won = false;
  overlay.style.display = 'none';
}
function start(){ reset(); }

function findPlatform(x, z){
  for (const p of platforms){
    if (x >= p.minX && x <= p.maxX && z >= p.minZ && z <= p.maxZ) return p;
  }
  return null;
}

function fall(){
  alive = false;
  titleEl.textContent = 'Fell!';
  msgEl.textContent = `${collected}/${gems.length} gems · ${elapsed.toFixed(1)}s`;
  statsEl.style.display = 'none';
  btn.textContent = 'Try again';
  overlay.style.display = 'flex';
}

function win(){
  alive = false; won = true;
  const best = +localStorage.getItem('cuberoll_best') || Infinity;
  if (elapsed < best) localStorage.setItem('cuberoll_best', elapsed.toFixed(1));
  titleEl.textContent = 'Solved!';
  msgEl.textContent = '';
  statsEl.style.display = 'flex';
  statsEl.innerHTML = `<div class="stat">Gems<b>${collected}/${gems.length}</b></div><div class="stat">Time<b>${elapsed.toFixed(1)}s</b></div><div class="stat">Best<b>${(+localStorage.getItem('cuberoll_best')||elapsed).toString()}s</b></div>`;
  btn.textContent = 'Play again';
  overlay.style.display = 'flex';
}

const clock = new THREE.Clock();
function animate(){
  const dt = Math.min(clock.getDelta(), 0.05);
  if (alive){
    elapsed += dt;
    timeEl.textContent = elapsed.toFixed(1);
    // input — framerate-independent (units/sec)
    const acc = 44;     // acceleration units/sec^2
    if (keys['arrowleft']  || keys['a']) velocity.x -= acc * dt;
    if (keys['arrowright'] || keys['d']) velocity.x += acc * dt;
    if (keys['arrowup']    || keys['w']) velocity.z -= acc * dt;
    if (keys['arrowdown']  || keys['s']) velocity.z += acc * dt;
    if (touchActive){ velocity.x += touchDX * acc * dt * 0.7; velocity.z -= touchDZ * acc * dt * 0.7; }
    // damping — equivalent to old 0.96 per frame at 60 Hz, but time-correct
    const damp = Math.pow(0.96, dt * 60);
    velocity.x *= damp; velocity.z *= damp;
    ball.position.x += velocity.x * dt;
    ball.position.z += velocity.z * dt;
    // rolling rotation
    ball.rotation.z -= velocity.x * dt * 1.6;
    ball.rotation.x += velocity.z * dt * 1.6;
    // gravity / platform check
    const p = findPlatform(ball.position.x, ball.position.z);
    if (p){
      const targetY = p.top + 0.42;
      ball.position.y += (targetY - ball.position.y) * (1 - Math.pow(0.6, dt * 60));
      velocity.y = 0;
    } else {
      velocity.y -= 72 * dt; // gravity in units/sec^2
      ball.position.y += velocity.y * dt;
      if (ball.position.y < -10){ fall(); }
    }
    // gems
    for (const g of gems){
      if (g.collected) continue;
      if (ball.position.distanceTo(g.mesh.position) < 0.8){
        g.collected = true; g.mesh.visible = false;
        collected++; scoreEl.textContent = collected;
      }
    }
    // win when reaches goal & all gems collected
    if (ball.position.distanceTo(goal.position) < 1.6 && collected === gems.length){ win(); }
  }
  // gem float
  for (const g of gems){
    if (!g.collected){
      g.t += dt * 2;
      g.mesh.position.y += Math.sin(g.t) * 0.005;
      g.mesh.rotation.y += dt * 1.5;
    }
  }
  // goal pulse
  goal.scale.setScalar(1 + Math.sin(clock.elapsedTime*2)*0.05);
  // camera follow — framerate-independent lerp
  const target = new THREE.Vector3(ball.position.x + 4, ball.position.y + 6, ball.position.z + 7);
  camera.position.lerp(target, 1 - Math.pow(1 - 0.08, dt * 60));
  camera.lookAt(ball.position.x, ball.position.y, ball.position.z);
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
alive = false;
animate();
</script>
</body>
</html>
