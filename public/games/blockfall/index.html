<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Blockfall</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,sans-serif;color:#f1f5f9;
    background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(255,107,53,.15),transparent 60%),
               linear-gradient(180deg,#020617,#0b1224);
    display:flex;align-items:center;justify-content:center;padding:12px;user-select:none;-webkit-user-select:none;touch-action:none}
  .wrap{display:flex;gap:16px;align-items:center;max-height:95vh}
  .stage{display:flex;flex-direction:column;gap:8px}
  canvas{border-radius:12px;border:1px solid #1e293b;background:#0f172a;display:block}
  .panel{display:flex;flex-direction:column;gap:10px;min-width:120px}
  .pill{background:rgba(15,23,42,.7);border:1px solid #1e293b;border-radius:10px;padding:8px 12px;font-size:13px}
  .pill b{display:block;color:#ffb627;font-size:20px;margin-top:2px}
  .next{background:rgba(15,23,42,.7);border:1px solid #1e293b;border-radius:10px;padding:8px}
  .next-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .controls{display:none;flex-direction:column;gap:6px;margin-top:8px}
  .controls button{background:rgba(15,23,42,.7);border:1px solid #1e293b;color:#fff;border-radius:8px;padding:10px;font-weight:600;cursor:pointer}
  @media(max-width:640px){.wrap{flex-direction:column;gap:10px}.panel{flex-direction:row;flex-wrap:wrap;width:100%}.controls{display:flex}}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.7);backdrop-filter:blur(8px);z-index:10}
  .card{background:rgba(15,23,42,.85);border:1px solid #1e293b;border-radius:18px;padding:28px;max-width:340px;text-align:center}
  h1{margin:0 0 8px;font-size:32px;background:linear-gradient(135deg,#ff6b35,#ffb627);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{margin:0 0 18px;color:#94a3b8;font-size:14px}
  .btn{border:0;background:linear-gradient(135deg,#ff6b35,#ffb627);color:white;font-weight:700;font-size:16px;padding:12px 28px;border-radius:999px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="c" width="200" height="400"></canvas>
    <div class="controls">
      <div style="display:flex;gap:6px">
        <button data-act="left">◀</button>
        <button data-act="rot">⟳</button>
        <button data-act="right">▶</button>
      </div>
      <div style="display:flex;gap:6px">
        <button data-act="down">▼</button>
        <button data-act="drop">DROP</button>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="pill">Score<b id="score">0</b></div>
    <div class="pill">Lines<b id="lines">0</b></div>
    <div class="pill">Level<b id="level">1</b></div>
    <div class="next">
      <div class="next-label">Next</div>
      <canvas id="next" width="80" height="80"></canvas>
    </div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="card">
    <h1 id="title">Blockfall</h1>
    <p id="msg">Stack and clear lines. ←→ move · ↑ rotate · ↓ soft drop · Space hard drop.</p>
    <button class="btn" id="btn">Play</button>
  </div>
</div>
<script>
(() => {
  const cv = document.getElementById('c'); const ctx = cv.getContext('2d');
  const ncv = document.getElementById('next'); const nctx = ncv.getContext('2d');
  const COLS = 10, ROWS = 20, BS = 20;
  const scoreEl=document.getElementById('score'), linesEl=document.getElementById('lines'), levelEl=document.getElementById('level');
  const overlay=document.getElementById('overlay'), titleEl=document.getElementById('title'), msgEl=document.getElementById('msg'), btn=document.getElementById('btn');

  const SHAPES = {
    I: { c:'#06b6d4', r:[[1,1,1,1]] },
    O: { c:'#facc15', r:[[1,1],[1,1]] },
    T: { c:'#a855f7', r:[[0,1,0],[1,1,1]] },
    S: { c:'#22c55e', r:[[0,1,1],[1,1,0]] },
    Z: { c:'#ef4444', r:[[1,1,0],[0,1,1]] },
    J: { c:'#3b82f6', r:[[1,0,0],[1,1,1]] },
    L: { c:'#fb923c', r:[[0,0,1],[1,1,1]] },
  };
  const KEYS = Object.keys(SHAPES);

  let grid, piece, next, score, lines, level, drop, lastTime, alive, flashRows=[], flashUntil=0;

  function newGrid(){ return Array.from({length:ROWS}, () => Array(COLS).fill(null)); }
  function randPiece(){
    const k = KEYS[(Math.random()*KEYS.length)|0]; const s = SHAPES[k];
    return { shape: s.r.map(r=>r.slice()), color: s.c, x: ((COLS - s.r[0].length)/2)|0, y: 0 };
  }
  function reset() {
    grid = newGrid(); piece = randPiece(); next = randPiece();
    score = 0; lines = 0; level = 1; drop = 800; lastTime = 0; alive = true;
    scoreEl.textContent=0; linesEl.textContent=0; levelEl.textContent=1;
  }
  function collide(p) {
    for (let y=0;y<p.shape.length;y++) for (let x=0;x<p.shape[y].length;x++) {
      if (!p.shape[y][x]) continue;
      const nx = p.x+x, ny = p.y+y;
      if (nx<0||nx>=COLS||ny>=ROWS) return true;
      if (ny>=0 && grid[ny][nx]) return true;
    }
    return false;
  }
  function merge() {
    for (let y=0;y<piece.shape.length;y++) for (let x=0;x<piece.shape[y].length;x++) {
      if (piece.shape[y][x]) {
        if (piece.y+y < 0) { alive=false; return; }
        grid[piece.y+y][piece.x+x] = piece.color;
      }
    }
    clearLines();
    piece = next; next = randPiece();
    if (collide(piece)) alive = false;
  }
  function clearLines() {
    let cleared = 0;
    flashRows = [];
    for (let y=ROWS-1;y>=0;y--) {
      if (grid[y].every(c => c)) { flashRows.push(y); grid.splice(y,1); grid.unshift(Array(COLS).fill(null)); cleared++; y++; }
    }
    if (cleared) flashUntil = performance.now() + 200;
    if (cleared) {
      lines += cleared;
      score += [0,100,300,500,800][cleared] * level;
      level = 1 + Math.floor(lines/10);
      drop = Math.max(80, 800 - (level-1)*70);
      scoreEl.textContent=score; linesEl.textContent=lines; levelEl.textContent=level;
    }
  }
  function rotate() {
    const s = piece.shape; const rot = s[0].map((_,i)=>s.map(r=>r[i]).reverse());
    const old = piece.shape; piece.shape = rot;
    if (collide(piece)) {
      // wall kicks
      const kicks = [-1,1,-2,2];
      let ok=false;
      for (const k of kicks){ piece.x += k; if (!collide(piece)){ok=true;break;} piece.x -= k; }
      if (!ok) piece.shape = old;
    }
  }
  function move(dx){ piece.x+=dx; if (collide(piece)) piece.x-=dx; }
  function softDrop(){ piece.y++; if (collide(piece)) { piece.y--; merge(); return true; } return false; }
  function hardDrop(){ while(!softDrop()){} }

  function drawCell(cx, x, y, color, sz=BS) {
    cx.fillStyle = color; cx.fillRect(x*sz, y*sz, sz, sz);
    cx.fillStyle = 'rgba(255,255,255,.18)'; cx.fillRect(x*sz, y*sz, sz, 3);
    cx.fillStyle = 'rgba(0,0,0,.25)'; cx.fillRect(x*sz, y*sz+sz-3, sz, 3);
  }
  function draw() {
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,cv.width,cv.height);
    // subtle vertical glow
    const g = ctx.createLinearGradient(0,0,0,cv.height);
    g.addColorStop(0,'rgba(255,107,53,.05)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,cv.width,cv.height);
    for (let y=0;y<ROWS;y++) for (let x=0;x<COLS;x++) if (grid[y][x]) drawCell(ctx,x,y,grid[y][x]);
    // ghost piece (drop preview)
    let gy = piece.y;
    while (true) {
      const test = { shape: piece.shape, x: piece.x, y: gy+1 };
      if (collide(test)) break;
      gy++;
    }
    if (gy !== piece.y) {
      for (let y=0;y<piece.shape.length;y++) for (let x=0;x<piece.shape[y].length;x++) {
        if (piece.shape[y][x]) {
          ctx.fillStyle = piece.color; ctx.globalAlpha = 0.18;
          ctx.fillRect((piece.x+x)*BS, (gy+y)*BS, BS, BS);
          ctx.globalAlpha = 1;
          ctx.strokeStyle = piece.color; ctx.strokeRect((piece.x+x)*BS+0.5, (gy+y)*BS+0.5, BS-1, BS-1);
        }
      }
    }
    for (let y=0;y<piece.shape.length;y++) for (let x=0;x<piece.shape[y].length;x++)
      if (piece.shape[y][x]) drawCell(ctx, piece.x+x, piece.y+y, piece.color);
    // line clear flash
    if (performance.now() < flashUntil) {
      const a = (flashUntil - performance.now()) / 200;
      ctx.fillStyle = `rgba(255,255,255,${a*0.6})`;
      flashRows.forEach(y => ctx.fillRect(0, y*BS, cv.width, BS));
    }
    // next
    nctx.fillStyle = '#0f172a'; nctx.fillRect(0,0,ncv.width,ncv.height);
    const ns = 16; const ox = (ncv.width - next.shape[0].length*ns)/2/ns; const oy = (ncv.height - next.shape.length*ns)/2/ns;
    for (let y=0;y<next.shape.length;y++) for (let x=0;x<next.shape[y].length;x++)
      if (next.shape[y][x]) drawCell(nctx, ox+x, oy+y, next.color, ns);
  }
  function loop(t) {
    if (!alive) return gameover();
    if (!lastTime) lastTime = t;
    if (t - lastTime > drop) { softDrop(); lastTime = t; }
    draw();
    requestAnimationFrame(loop);
  }
  function gameover(){
    titleEl.textContent = 'Game over'; msgEl.textContent = `Score ${score}. Lines ${lines}.`;
    btn.textContent = 'Play again'; overlay.style.display='flex';
  }
  function start(){ reset(); overlay.style.display='none'; lastTime = 0; requestAnimationFrame(loop); }
  btn.addEventListener('click', start);

  addEventListener('keydown', e => {
    if (!alive) return;
    if (['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)) e.preventDefault();
    if (e.key==='ArrowLeft') move(-1);
    else if (e.key==='ArrowRight') move(1);
    else if (e.key==='ArrowDown') softDrop();
    else if (e.key==='ArrowUp') rotate();
    else if (e.key===' ') hardDrop();
  });
  document.querySelectorAll('.controls button').forEach(b => b.addEventListener('click', () => {
    const a = b.dataset.act;
    if (a==='left') move(-1);
    else if (a==='right') move(1);
    else if (a==='rot') rotate();
    else if (a==='down') softDrop();
    else if (a==='drop') hardDrop();
  }));

  reset(); draw();
})();
</script>
</body>
</html>
