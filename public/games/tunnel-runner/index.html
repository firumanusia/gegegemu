<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Tunnel Runner</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,sans-serif;color:#fff;background:#020617;user-select:none;-webkit-user-select:none;touch-action:none;cursor:none}
  #stage{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}
  .hud{position:fixed;top:18px;left:0;right:0;display:flex;justify-content:space-between;padding:0 22px;pointer-events:none;z-index:5}
  .pill{background:rgba(15,23,42,.55);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:6px 16px;font-size:18px;font-weight:800;backdrop-filter:blur(8px);text-shadow:0 2px 6px rgba(0,0,0,.4)}
  .score{color:#ffb627}.speed{color:#ff6b35}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.5);backdrop-filter:blur(10px);z-index:10;padding:20px}
  .card{background:rgba(15,23,42,.85);border:1px solid #1e293b;border-radius:18px;padding:30px;max-width:360px;text-align:center;box-shadow:0 30px 80px -20px rgba(0,0,0,.6)}
  h1{margin:0 0 8px;font-size:34px;background:linear-gradient(135deg,#ff6b35,#ffb627);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{margin:0 0 18px;color:#94a3b8;font-size:14px;line-height:1.5}
  .stats{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
  .stat{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);padding:8px 14px;border-radius:10px;font-size:13px}
  .stat b{display:block;font-size:20px;color:#ffb627}
  .btn{border:0;background:linear-gradient(135deg,#ff6b35,#ffb627);color:white;font-weight:700;font-size:18px;padding:14px 32px;border-radius:999px;cursor:pointer;box-shadow:0 12px 28px -10px rgba(255,107,53,.5);transition:transform .12s}
  .btn:hover{transform:scale(1.04)} .btn:active{transform:scale(.96)}
</style>
</head>
<body>
<div id="stage"></div>
<div class="hud">
  <span class="pill score">⭐ <span id="score">0</span></span>
  <span class="pill speed"><span id="speed">1.0</span>×</span>
</div>
<div class="overlay" id="overlay">
  <div class="card">
    <h1 id="title">Tunnel Runner</h1>
    <p id="msg">Drag, move your mouse, or use ← → / A D to dodge.<br>Survive as long as you can. Speed ramps up.</p>
    <div class="stats" id="stats" style="display:none"></div>
    <button class="btn" id="btn">Launch</button>
  </div>
</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

const stage = document.getElementById('stage');
const overlay = document.getElementById('overlay');
const titleEl = document.getElementById('title'), msgEl = document.getElementById('msg');
const statsEl = document.getElementById('stats'), btn = document.getElementById('btn');
const scoreEl = document.getElementById('score'), speedEl = document.getElementById('speed');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000814, 12, 90);

const camera = new THREE.PerspectiveCamera(72, 1, 0.1, 200);
camera.position.set(0, 1.2, 4);

function resize(){ renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); }
resize(); addEventListener('resize', resize);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const key = new THREE.PointLight(0xff6b35, 2.2, 30, 1.5); key.position.set(0, 0, 2); camera.add(key); scene.add(camera);
const rim = new THREE.PointLight(0xffb627, 1.4, 25, 1.5); rim.position.set(0, 4, -6); scene.add(rim);

// Tunnel — repeating ring segments stretching ahead
const RING_COUNT = 30;
const RING_SPACING = 4;
const TUNNEL_RADIUS = 5;
const rings = [];
const ringGeo = new THREE.TorusGeometry(TUNNEL_RADIUS, 0.08, 6, 36);
for (let i=0;i<RING_COUNT;i++){
  const hue = (i * 12) % 360;
  const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(`hsl(${hue}, 80%, 55%)`) });
  const m = new THREE.Mesh(ringGeo, mat);
  m.position.z = -i * RING_SPACING;
  m.rotation.x = Math.PI/2;
  scene.add(m); rings.push(m);
}

// Stars/dust along tunnel
{
  const N = 400; const positions = new Float32Array(N*3);
  for (let i=0;i<N;i++){
    const a = Math.random()*Math.PI*2;
    const r = TUNNEL_RADIUS * (0.85 + Math.random()*0.13);
    positions[i*3] = Math.cos(a) * r;
    positions[i*3+1] = Math.sin(a) * r;
    positions[i*3+2] = -Math.random() * RING_COUNT * RING_SPACING;
  }
  const g = new THREE.BufferGeometry(); g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const m = new THREE.PointsMaterial({ size: 0.08, color: 0xffffff, transparent: true, opacity: 0.8 });
  var dustField = new THREE.Points(g, m); scene.add(dustField);
}

// Player ship (just a sleek diamond)
const ship = new THREE.Group();
{
  const body = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.9, 8), new THREE.MeshStandardMaterial({ color: 0xfff5da, emissive: 0xff6b35, emissiveIntensity: 0.6, roughness: 0.3, metalness: 0.3 }));
  body.rotation.x = Math.PI/2;
  ship.add(body);
  const wing = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.06, 0.32), new THREE.MeshStandardMaterial({ color: 0xff6b35, emissive: 0xff6b35, emissiveIntensity: 0.4 }));
  ship.add(wing);
  const glow = new THREE.PointLight(0xffb627, 1.5, 6); glow.position.set(0, 0, 0.5); ship.add(glow);
}
ship.position.set(0, 0, 2);
scene.add(ship);

// Obstacles — colored cubes positioned around the tunnel
class Obstacle {
  constructor(z){
    const size = 0.7 + Math.random()*0.6;
    const angle = Math.random()*Math.PI*2;
    const r = TUNNEL_RADIUS * (0.4 + Math.random()*0.45);
    const geo = new THREE.BoxGeometry(size, size, size);
    const hue = 0 + (Math.random()*40);
    const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color(`hsl(${hue}, 90%, 55%)`), emissive: new THREE.Color(`hsl(${hue}, 90%, 35%)`), emissiveIntensity: 0.5, roughness: 0.5 });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.position.set(Math.cos(angle)*r, Math.sin(angle)*r, z);
    this.size = size;
    // spin in radians/sec (was per-frame at 60Hz)
    this.spin = (Math.random()*0.04 - 0.02) * 60;
    scene.add(this.mesh);
  }
  update(forward, dt){
    this.mesh.position.z += forward;
    this.mesh.rotation.x += this.spin * dt;
    this.mesh.rotation.y += this.spin * 0.7 * dt;
  }
  hits(shipPos){
    const dx = this.mesh.position.x - shipPos.x;
    const dy = this.mesh.position.y - shipPos.y;
    const dz = this.mesh.position.z - shipPos.z;
    if (Math.abs(dz) > 0.8) return false;
    return (dx*dx + dy*dy) < (this.size * 0.7) ** 2;
  }
}
let obstacles = [];
function spawnObstacleField(zFar){
  // batch of 1-3
  const n = 1 + ((Math.random()*3)|0);
  for (let i=0;i<n;i++) obstacles.push(new Obstacle(zFar + (Math.random()-0.5)*4));
}

let alive = false;
let score = 0;
let speed = 0.5;
let targetX = 0, targetY = 0;
let nextSpawnZ = -20;
let bestY = 1.2;
let elapsed = 0;

function reset(){
  obstacles.forEach(o => scene.remove(o.mesh)); obstacles = [];
  score = 0; speed = 0.5; elapsed = 0; nextSpawnZ = -20;
  scoreEl.textContent = '0'; speedEl.textContent = '1.0';
  ship.position.set(0, 0, 2); targetX = 0; targetY = 0;
  alive = true;
}

function start(){ reset(); overlay.style.display='none'; }

function gameover(){
  alive = false;
  const best = +localStorage.getItem('tunnel_best') || 0;
  if (score > best) localStorage.setItem('tunnel_best', score);
  titleEl.textContent = 'Crashed!';
  msgEl.textContent = '';
  statsEl.style.display = 'flex';
  statsEl.innerHTML = `<div class="stat">Score<b>${score}</b></div><div class="stat">Best<b>${Math.max(best, score)}</b></div>`;
  btn.textContent = 'Play again';
  overlay.style.display = 'flex';
}

// Input
const mouse = { x: 0, y: 0 };
addEventListener('pointermove', e => {
  const nx = (e.clientX / innerWidth) * 2 - 1;
  const ny = -((e.clientY / innerHeight) * 2 - 1);
  targetX = nx * TUNNEL_RADIUS * 0.7;
  targetY = ny * TUNNEL_RADIUS * 0.5;
});
const keys = {};
addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (['arrowleft','arrowright','arrowup','arrowdown'].includes(e.key.toLowerCase())) e.preventDefault(); });
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
btn.addEventListener('click', start);

const clock = new THREE.Clock();
function animate(){
  const dt = Math.min(clock.getDelta(), 0.05);
  if (alive){
    elapsed += dt;
    // speed in units/sec — was 0.5..2.5 per frame at 60Hz, so 30..150 per sec
    speed = 30 + Math.min(120, elapsed * 2.4);
    speedEl.textContent = (1 + (speed - 30) / 30).toFixed(1);
    const dz = speed * dt; // distance moved this frame
    // keyboard input adjusts target
    const k = 4 * dt;
    if (keys['arrowleft']  || keys['a']) targetX -= k;
    if (keys['arrowright'] || keys['d']) targetX += k;
    if (keys['arrowup']    || keys['w']) targetY += k;
    if (keys['arrowdown']  || keys['s']) targetY -= k;
    const maxR = TUNNEL_RADIUS * 0.78;
    const mag = Math.hypot(targetX, targetY);
    if (mag > maxR){ targetX = targetX/mag*maxR; targetY = targetY/mag*maxR; }
    // smooth ship — framerate-independent lerp
    const lerpT = 1 - Math.pow(1 - 0.18, dt * 60);
    ship.position.x += (targetX - ship.position.x) * lerpT;
    ship.position.y += (targetY - ship.position.y) * lerpT;
    ship.rotation.z = -(targetX - ship.position.x) * 1.6;
    ship.rotation.x = -(targetY - ship.position.y) * 0.8;

    // move tunnel rings toward camera (loop)
    for (const r of rings){
      r.position.z += dz;
      if (r.position.z > 6){ r.position.z -= RING_COUNT * RING_SPACING; }
    }
    // dust
    const positions = dustField.geometry.attributes.position.array;
    for (let i=0;i<positions.length;i+=3){
      positions[i+2] += dz;
      if (positions[i+2] > 6) positions[i+2] -= RING_COUNT * RING_SPACING;
    }
    dustField.geometry.attributes.position.needsUpdate = true;

    // obstacles
    for (const o of obstacles) o.update(dz, dt);
    // spawn new ahead
    nextSpawnZ += dz;
    if (nextSpawnZ > -8){
      spawnObstacleField(-RING_COUNT * RING_SPACING * 0.8);
      nextSpawnZ = -20 - Math.random()*5;
    }
    // cull
    obstacles = obstacles.filter(o => {
      if (o.mesh.position.z > 8){
        scene.remove(o.mesh); o.mesh.geometry.dispose();
        score++; scoreEl.textContent = score;
        return false;
      }
      return true;
    });
    // collisions
    for (const o of obstacles){
      if (o.hits(ship.position)){ gameover(); break; }
    }
  }
  // camera bobbing
  camera.position.x = ship.position.x * 0.25;
  camera.position.y = 1.2 + ship.position.y * 0.15;
  camera.lookAt(ship.position.x * 0.4, ship.position.y * 0.4, -5);
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

reset(); alive = false;
animate();
</script>
</body>
</html>
