<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Memory Match</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:system-ui,sans-serif;color:#f1f5f9;
    background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(255,107,53,.15),transparent 60%),
               linear-gradient(180deg,#020617,#0b1224);
    display:flex;align-items:center;justify-content:center;padding:16px;user-select:none;-webkit-user-select:none}
  .wrap{display:flex;flex-direction:column;gap:14px;width:100%;max-width:520px}
  .hud{display:flex;justify-content:space-between;gap:8px}
  .pill{background:rgba(15,23,42,.7);border:1px solid #1e293b;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600}
  .moves{color:#ffb627}.matches{color:#22c55e}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .card{aspect-ratio:1;perspective:600px;cursor:pointer}
  .inner{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d}
  .card.flipped .inner, .card.matched .inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:36px;backface-visibility:hidden;border:1px solid #1e293b}
  .front{background:linear-gradient(135deg,#1e293b,#0f172a)}
  .front::after{content:'?';font-size:32px;color:#475569;font-weight:800}
  .back{background:linear-gradient(135deg,#1e293b,#111c33);transform:rotateY(180deg)}
  .card.matched .back{background:linear-gradient(135deg,#16a34a,#22c55e);box-shadow:0 0 24px rgba(34,197,94,.3)}
  .restart{align-self:center;border:0;background:rgba(15,23,42,.7);border:1px solid #1e293b;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
  .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(2,6,23,.7);backdrop-filter:blur(8px);z-index:10}
  .overlay.show{display:flex}
  .modal{background:rgba(15,23,42,.85);border:1px solid #1e293b;border-radius:18px;padding:28px;text-align:center;max-width:320px}
  h1{margin:0 0 8px;font-size:30px;background:linear-gradient(135deg,#ff6b35,#ffb627);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{margin:0 0 18px;color:#94a3b8;font-size:14px}
  .btn{border:0;background:linear-gradient(135deg,#ff6b35,#ffb627);color:white;font-weight:700;font-size:16px;padding:12px 28px;border-radius:999px;cursor:pointer}
  .confetti{position:fixed;width:8px;height:14px;pointer-events:none;z-index:20;border-radius:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div class="pill moves">🎯 Moves: <span id="moves">0</span></div>
    <div class="pill matches">✓ Pairs: <span id="matches">0</span>/8</div>
  </div>
  <div class="grid" id="grid"></div>
  <button class="restart" id="restart">↻ Restart</button>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <h1>You won!</h1>
    <p id="result">Solved in 0 moves.</p>
    <button class="btn" id="again">Play again</button>
  </div>
</div>
<script>
(() => {
  const EMOJI = ['✨','🔥','⚡','🌟','💎','🎯','🚀','🎨'];
  const gridEl = document.getElementById('grid');
  const movesEl = document.getElementById('moves'), matchesEl = document.getElementById('matches');
  const overlay = document.getElementById('overlay'), resultEl = document.getElementById('result');
  let cards, opened, moves, matches, locked;

  function shuffle(a){ for (let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function build(){
    cards = shuffle([...EMOJI, ...EMOJI].map((v,i)=>({v,i,matched:false,el:null,opened:false})));
    moves=0; matches=0; opened=[]; locked=false;
    movesEl.textContent=0; matchesEl.textContent='0/8';
    gridEl.innerHTML='';
    cards.forEach(c => {
      const card = document.createElement('div'); card.className='card';
      card.innerHTML = `<div class="inner"><div class="face front"></div><div class="face back">${c.v}</div></div>`;
      card.addEventListener('click', () => flip(c));
      c.el = card; gridEl.appendChild(card);
    });
  }
  function flip(c){
    if (locked || c.opened || c.matched) return;
    c.opened = true; c.el.classList.add('flipped'); opened.push(c);
    if (opened.length === 2) {
      moves++; movesEl.textContent = moves; locked = true;
      const [a,b] = opened;
      if (a.v === b.v) {
        a.matched = b.matched = true;
        a.el.classList.add('matched'); b.el.classList.add('matched');
        matches++; matchesEl.textContent = `${matches}/8`;
        opened = []; locked = false;
        if (matches === 8) setTimeout(win, 500);
      } else {
        setTimeout(() => {
          a.el.classList.remove('flipped'); b.el.classList.remove('flipped');
          a.opened = b.opened = false; opened = []; locked = false;
        }, 750);
      }
    }
  }
  function confetti(){
    const colors=['#ff6b35','#ffb627','#22c55e','#3b82f6','#a855f7','#ec4899'];
    for (let i=0;i<60;i++){
      const c = document.createElement('div'); c.className='confetti';
      c.style.background = colors[(Math.random()*colors.length)|0];
      c.style.left = (Math.random()*100)+'vw';
      c.style.top = '-20px';
      c.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(c);
      const dx = (Math.random()*2-1)*40, dur = 2200 + Math.random()*1400;
      c.animate(
        [{ transform:c.style.transform, top:'-20px' },
         { transform:`rotate(${Math.random()*720}deg) translate(${dx}vw,0)`, top:'110vh' }],
        { duration: dur, easing:'cubic-bezier(.2,.4,.4,1)' }
      ).onfinish = () => c.remove();
    }
  }
  function win(){ resultEl.textContent = `Solved in ${moves} moves.`; overlay.classList.add('show'); confetti(); }
  document.getElementById('again').addEventListener('click', () => { overlay.classList.remove('show'); build(); });
  document.getElementById('restart').addEventListener('click', build);
  build();
})();
</script>
</body>
</html>
