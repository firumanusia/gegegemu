<!DOCTYPE html>
<head>
<title>Match Cascade</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
<style>
  :root { color-scheme: dark }
  * { box-sizing: border-box }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", "Manrope", sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 15% -10%, rgba(255, 107, 53, 0.12), transparent 60%),
      radial-gradient(ellipse 70% 50% at 90% 10%, rgba(255, 182, 39, 0.08), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 110%, rgba(124, 58, 237, 0.08), transparent 60%),
      linear-gradient(180deg, #050818 0%, #0a0f24 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f1f5f9;
  }
  body {
    padding: 16px;
  }
  canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    border-radius: 24px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.08) inset,
      0 30px 80px -20px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.05);
  }
</style>
</head>
<body>
<script src="game.js" type="module"></script>
</body>
