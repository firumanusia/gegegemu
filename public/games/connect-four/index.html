<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Connect Four</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:system-ui,sans-serif;color:#f1f5f9;
    background:linear-gradient(180deg,#020617,#0b1224);
    display:flex;align-items:center;justify-content:center;padding:14px;user-select:none;-webkit-user-select:none}
  .wrap{display:flex;flex-direction:column;gap:12px;width:100%;max-width:480px}
  .head{display:flex;justify-content:space-between;align-items:center}
  .pill{background:rgba(15,23,42,.7);border:1px solid #1e293b;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600}
  .you{color:#ff6b35}.cpu{color:#ffb627}
  .status{text-align:center;font-size:16px;font-weight:600;min-height:24px}
  .board{background:#1e3a8a;border-radius:14px;padding:10px;display:grid;grid-template-columns:repeat(7,1fr);gap:6px;aspect-ratio:7/6;cursor:pointer;box-shadow:0 0 60px -20px rgba(59,130,246,.4)}
  .cell{aspect-ratio:1;background:#020617;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .cell .p{width:78%;height:78%;border-radius:50%;transition:transform .25s ease-out}
  .cell.r .p{background:radial-gradient(circle at 35% 30%,#ff8c5a,#ff6b35 60%,#9a3412);box-shadow:0 0 12px rgba(255,107,53,.4)}
  .cell.y .p{background:radial-gradient(circle at 35% 30%,#ffd86b,#ffb627 60%,#854d0e);box-shadow:0 0 12px rgba(255,182,39,.4)}
  .cell.win .p{box-shadow:0 0 20px rgba(255,255,255,.8);transform:scale(1.08)}
  .btn{border:0;background:linear-gradient(135deg,#ff6b35,#ffb627);color:white;font-weight:700;padding:10px 22px;border-radius:999px;cursor:pointer;align-self:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="pill you">You ⬤ <span id="ws">0</span></div>
    <div class="pill cpu">CPU ⬤ <span id="cs">0</span></div>
  </div>
  <div class="status" id="status">Your turn — click a column</div>
  <div class="board" id="board"></div>
  <button class="btn" id="reset">New game</button>
</div>
<script>
(() => {
  const ROWS=6, COLS=7;
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const wsEl = document.getElementById('ws'), csEl = document.getElementById('cs');
  let board, current, over, wins=0, losses=0;

  function build(){
    boardEl.innerHTML='';
    board = Array.from({length:ROWS}, ()=>Array(COLS).fill(0));
    current = 1; over = false;
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
      const el = document.createElement('div'); el.className='cell';
      el.innerHTML='<div class="p"></div>';
      el.addEventListener('click', () => move(c));
      el.dataset.r = r; el.dataset.c = c;
      boardEl.appendChild(el);
    }
    statusEl.textContent='Your turn — click a column';
  }
  function dropPiece(col, p){
    for (let r=ROWS-1;r>=0;r--){
      if (board[r][col] === 0){
        board[r][col] = p;
        const idx = r*COLS+col; const cell = boardEl.children[idx];
        cell.classList.add(p===1?'r':'y');
        return r;
      }
    }
    return -1;
  }
  function move(col){
    if (over || current !== 1) return;
    const r = dropPiece(col, 1);
    if (r < 0) return;
    if (check(1)) return;
    if (full()) { endGame(0); return; }
    current = 2; statusEl.textContent='CPU thinking…';
    setTimeout(cpu, 350);
  }
  function cpu(){
    // pick winning move; else block; else random with center bias
    let col = winningMove(2);
    if (col < 0) col = winningMove(1); // block
    if (col < 0){
      const order = [3,2,4,1,5,0,6];
      for (const c of order) if (canPlay(c)) { col = c; break; }
    }
    dropPiece(col, 2);
    if (check(2)) return;
    if (full()) { endGame(0); return; }
    current = 1; statusEl.textContent='Your turn — click a column';
  }
  function canPlay(col){ return board[0][col] === 0; }
  function winningMove(p){
    for (let c=0;c<COLS;c++){
      if (!canPlay(c)) continue;
      let r=ROWS-1; while (board[r][c] !== 0) r--;
      board[r][c] = p;
      const win = wins4(p);
      board[r][c] = 0;
      if (win) return c;
    }
    return -1;
  }
  function wins4(p){
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
      for (const [dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]){
        let k=0; const line=[];
        for (let i=0;i<4;i++){
          const nr=r+dr*i, nc=c+dc*i;
          if (nr<0||nr>=ROWS||nc<0||nc>=COLS) break;
          if (board[nr][nc] !== p) break;
          k++; line.push([nr,nc]);
        }
        if (k===4) return line;
      }
    }
    return null;
  }
  function check(p){
    const line = wins4(p);
    if (line){
      line.forEach(([r,c]) => boardEl.children[r*COLS+c].classList.add('win'));
      endGame(p);
      return true;
    }
    return false;
  }
  function full(){ return board[0].every(x => x !== 0); }
  function endGame(p){
    over=true;
    if (p===1){ wins++; wsEl.textContent=wins; statusEl.textContent='You win!'; }
    else if (p===2){ losses++; csEl.textContent=losses; statusEl.textContent='CPU wins.'; }
    else { statusEl.textContent="It's a draw."; }
  }
  document.getElementById('reset').addEventListener('click', build);
  build();
})();
</script>
</body>
</html>
